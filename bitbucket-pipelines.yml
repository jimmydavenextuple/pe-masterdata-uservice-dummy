    sperf:
      ingress: yes
      middleman: yes
      prometheus: yes
      storage: yes
      keyvault: yes
      java-opts: "-Xms2048m -Xmx2048m"
      scale:
        replicas: 2
      resources:
        min:
          memory: 3Gi
