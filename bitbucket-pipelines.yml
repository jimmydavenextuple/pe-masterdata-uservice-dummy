  environments:
    vapt:
      ingress: yes
      middleman: yes
      prometheus: yes
      keyvault: yes
      storage: yes
      scale:
        replicas: 2
      resources:
        min:
          memory: "1024Mi"
          cpu: 256m
        max:
          memory: "1024Mi"
          cpu: 256m
