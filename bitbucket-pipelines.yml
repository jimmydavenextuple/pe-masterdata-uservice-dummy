          cpu: 256m
        max:
          memory: "1024Mi"
          cpu: 256m
    dev:
      ingress: yes
      middleman: yes
      prometheus: yes
      storage: yes
      java-opts: "-Xms1024m -Xmx1024m"
      keyvault: yes
      scale:
        replicas: 1
