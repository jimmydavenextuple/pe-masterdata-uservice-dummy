options:
  docker: true
image: openjdk:11
clone:
  depth: full
server:
  service:
    name: "pe-masterdata-uservice"
    path:
      - promising-engine/pe-node
      - promising-engine/pe-item
      - promising-engine/pe-data-upload
      - promising-engine/pe-promise-sourcing-rule
      - promising-engine/pe-weightage-configuration
      - promising-engine/pe-postal-code-timezone
      - promising-engine/pe-transit
      - promising-engine/pe-node-carrier
      - promising-engine/pe-calendar
      - promising-engine/pe-carrier
