image: openjdk:11

clone:
  depth: full

definitions:
  caches:
    sonar: ~/.sonar/cache
    cve: ~/.cve
  steps:
    - step: &publish-snapshot
        name: Build and publish snapshot
        caches:
          - gradle
          - sonar
        script:
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build jacocoTestReport artifactoryPublish
    - step: &publish-release
        name: Build and publish release
        caches:
          - gradle
          - sonar
        script:
          - bash ./gradlew -Pbuild_target=RELEASE clean build jacocoTestReport artifactoryPublish
    - step: &pr-build
        name: PR Build
        caches:
          - gradle
          - sonar
          - cve
        script:
          - git clone git@bitbucket.org:nextuple_engineering/deployment-scripts.git
          - cp ./deployment-scripts/suppressions.xml ./suppressions.xml
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build jacocoTestReport spotlessCheck spotbugsMain
          - bash ./gradlew dependencyCheckAggregate --info
          - bash ./gradlew sonarqube showSonarQubeLink --info

pipelines:
  pull-requests:
    '**':
      - step: *pr-build
  branches:
    vapt:
      - step: *publish-snapshot
    release:
      - step: *publish-release
    master:
      - step: *publish-release
    development:
      - step: *publish-snapshot
