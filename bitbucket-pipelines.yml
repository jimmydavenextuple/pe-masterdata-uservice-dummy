          memory: 2Gi
          cpu: 1
        max:
          memory: 2Gi
          cpu: 1
    integration:
      ingress: yes
      middleman: yes
      prometheus: yes
      keyvault: yes
      scale:
        replicas: 1
      resources:
        min:
          memory: 1024Mi
          cpu: 256m
        max:
          memory: 1024Mi
          cpu: 1000m
    qa:
      ingress: yes
      middleman: yes
      prometheus: yes
      storage: yes
      java-opts: "-Xms1024m -Xmx1024m"
      keyvault: yes
      scale:
        replicas: 1
      resources:
        min:
          memory: 2Gi
          cpu: 1
        max:
          memory: 2Gi
          cpu: 1
    sandbox:
      ingress: yes
      middleman: yes
      prometheus: yes
      keyvault: yes
      storage: yes
      java-opts: "-Xms2048m -Xmx2048m"
      scale:
        replicas: 1
      resources:
        min:
          memory: 3Gi
          cpu: 1
        max:
          memory: 3Gi
          cpu: 2
    sdev:
      ingress: yes
      middleman: yes
      prometheus: yes
      storage: yes
      keyvault: yes
      scale:
        replicas: 1
      resources:
        min:
          memory: "1024Mi"
          cpu: 256m
        max:
          memory: "1024Mi"
          cpu: 256m
    sqa:
      ingress: yes
      middleman: yes
      prometheus: yes
      storage: yes
      keyvault: yes
      scale:
        replicas: 1
      resources:
        min:
