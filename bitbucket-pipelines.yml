definitions:
  caches:
    sonar: ~/.sonar/cache
    cve: ~/.cve
  steps:
    - step: &build
        name: Build Snapshot
        caches:
          - gradle
          - sonar
        script:
          - microdnf install git
          - microdnf install findutils
          - |
            # Auto-version Update
            BASE_BRANCH="development"
            SKIP_COMMIT=$(git log -1 --pretty=format:%s)

            if [[ "$SKIP_COMMIT" =~ \[ci\ skip\]\ version\ updated ]]; then
              echo "Rerunning the pipeline"
            else
              # Compare the latest commit with the base branch
              CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
              if [[ "$CURRENT_BRANCH" == "$BASE_BRANCH" ]]; then
                CHANGED_FILES=$(git diff --name-only HEAD $BASE_BRANCH)
                echo "Changed files: $CHANGED_FILES"
                if echo "$CHANGED_FILES" | grep -q "version.yml"; then
                  echo "version.yml file has been modified, skipping version update."
                else
                  # Run Gradle tasks to update the patch version and set pre-release
                  bash ./gradlew conditionalPatchVersionUpdate preReleaseVersion

                  # Fetch updated version from version.yml
                  VERSION_FILE="version.yml"
                  MAJOR_VERSION=$(grep "major:" $VERSION_FILE | awk '{print $2}')
                  MINOR_VERSION=$(grep "minor:" $VERSION_FILE | awk '{print $2}')
                  PATCH_VERSION=$(grep "patch:" $VERSION_FILE | awk '{print $2}')
                  bash ./gradlew initializeAllowedVersion
                  # Display updated version
                  echo "Updated version: major $MAJOR_VERSION, minor $MINOR_VERSION, patch $PATCH_VERSION"         
                fi
              else
                echo "Skipping version update as the current branch is not development."
              fi
            fi
          - git clone git@bitbucket.org:nextuple_engineering/infra-automation.git
          - ./infra-automation/basic_build_validations.sh
          - ./infra-automation/copySuppressions.sh
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=SNAPSHOT -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
          - |
            # Conditionally run Git steps for the development branch
            if [[ "$CURRENT_BRANCH" == "$BASE_BRANCH" ]]; then
              git add $VERSION_FILE service-version.txt
              git commit --no-verify --allow-empty -m "[ci skip] version updated"
              git remote set-url origin https://${APP_USER}:${APP_SECRET}@bitbucket.org/${BITBUCKET_REPO_OWNER}/${BITBUCKET_REPO_SLUG}
              git push
            else
              echo "Skipping Git steps as the current branch is not development."
            fi
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-qa
        name: Build QA
        caches:
          - gradle
          - sonar
        script:
          - bash ./gradlew -Pbuild_target=QA clean build --refresh-dependencies artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=QA -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-stage
        name: Build Stage
        caches:
          - gradle
        script:
          - bash ./gradlew -Pbuild_target=STAGED clean build artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=STAGED -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-release
        name: Build Release
        script:
          - echo "Pre Deploy Step"
    - step: &deploy
        caches:
          - gradle
        services:
          - docker
        image: mcr.microsoft.com/azure-cli:2.53.1
        script:
          - git clone git@bitbucket.org:nextuple_engineering/deployment-scripts.git
          - chmod +x ./deployment-scripts/deploy-k8s-service-v7.sh
          - chmod +x ./deployment-scripts/trivy.sh
          - ./deployment-scripts/deploy-k8s-service-v7.sh
        artifacts:
          - trivy_report*.txt
        after-script:
          - chmod +x ./deployment-scripts/after-deploy-k8s-service-v3.sh
          - ./deployment-scripts/after-deploy-k8s-service-v3.sh
    - step: &pr-build
        size: 4x
        name: PR Build
        caches:
          - gradle
          - sonar
          - cve
        script:
          - microdnf install git
          - microdnf install findutils
          - git clone git@bitbucket.org:nextuple_engineering/infra-automation.git
          - ./infra-automation/basic_build_validations.sh
          - ./infra-automation/copySuppressions.sh
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build jacocoTestReport spotbugsMain
          - bash ./gradlew dependencyCheckAggregate --info
          - bash ./gradlew sonarqube showSonarQubeLink --info
    - step: &Clear-Cache
        name: Clear Pipeline Cache
        script:
          - pipe: atlassian/bitbucket-clear-cache:3.3.0
            variables:
              BITBUCKET_ACCESS_TOKEN: $BITBUCKET_ACCESS_TOKEN
              CACHES: ["gradle"]
pipelines:
  pull-requests:
    '**':
      - step: *pr-build
  tags:
    '*-SNAPSHOT':
      - step: *Clear-Cache
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Dev
          deployment: dev
      - parallel:
          - step:
              !!merge <<: *deploy
              name: Deploy QA
              trigger: manual
              deployment: qa
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy PERF
          #     trigger: manual
          #     deployment: perf
    '*-SANDBOX':
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Sandbox
          deployment: sandbox
    '*-RELEASE':
      - step: *Clear-Cache
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
  branches:
    vapt:
      - step: *build
      - step:
          !!merge <<: *deploy
          name: Deploy vapt
          deployment: vapt
    development:
      - step: *build
      - parallel:
          - step:
              !!merge <<: *deploy
              trigger: manual
              name: Deploy Dev
              deployment: dev
          - step:
              !!merge <<: *deploy
              trigger: manual
              name: Deploy Orielly
              deployment: orielly
          - step:
              !!merge <<: *deploy
              name: Deploy QA
              trigger: manual
              deployment: qa
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy PERF
          #     trigger: manual
          #     deployment: perf
    master:
      - step: *Clear-Cache
      - step: *build
      - parallel:
          - step:
              !!merge <<: *deploy
              name: Deploy demo
              trigger: manual
              deployment: demo
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy Pre-prod
          #     trigger: manual
          #     deployment: preprod
          - step:
              !!merge <<: *deploy
              name: Deploy SQA
              trigger: manual
              deployment: sqa          
          - step:
              !!merge <<: *deploy
              name: Deploy SDEV
              trigger: manual
              deployment: sdev
      - step:
          !!merge <<: *deploy
          name: Deploy Sandbox
          trigger: manual
          deployment: sandbox              
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
    master2:
      - step: *Clear-Cache
      - step: *build
      - step:
          !!merge <<: *deploy
          name: Deploy Demo
          trigger: manual
          deployment: demo
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
    hotfixes/*:
      - step: *Clear-Cache
      - step: *build
      - parallel:
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy Pre-prod
          #     trigger: manual
          #     deployment: preprod
          - step:
              !!merge <<: *deploy
              name: Deploy SDEV
              trigger: manual
              deployment: sdev
          - step:
              !!merge <<: *deploy
              name: Deploy SQA
              trigger: manual
              deployment: sqa
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
