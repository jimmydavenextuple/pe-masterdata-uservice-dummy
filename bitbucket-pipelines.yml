definitions:
  caches:
    sonar: ~/.sonar/cache
    cve: ~/.cve
  steps:
    - step: &build
        name: Build Snapshot
        caches:
          - gradle
          - sonar
        script:
          - microdnf install git
          - microdnf install findutils
          - git clone git@bitbucket.org:nextuple_engineering/infra-automation.git
          - ./infra-automation/copySuppressions.sh
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=SNAPSHOT -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-qa
        name: Build QA
        caches:
          - gradle
          - sonar
        script:
          - bash ./gradlew -Pbuild_target=QA clean build --refresh-dependencies artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=QA -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-stage
        name: Build Stage
        caches:
          - gradle
        script:
          - bash ./gradlew -Pbuild_target=STAGED clean build artifactoryPublish
          - export SPACE=" "
          - bash ./gradlew -Pbuild_target=STAGED -q properties | grep version | sed -e "s@version:$SPACE@@g" > service-version.txt
        artifacts:
          - build/**
          - service-version.txt
    - step: &build-release
        name: Build Release
        script:
          - echo "Pre Deploy Step"
    - step: &deploy
        caches:
          - gradle
        services:
          - docker
        image: mcr.microsoft.com/azure-cli:2.53.1
        script:
          - git clone git@bitbucket.org:nextuple_engineering/deployment-scripts.git
          - chmod +x ./deployment-scripts/deploy-k8s-service-v7.sh
          - ./deployment-scripts/deploy-k8s-service-v7.sh
        after-script:
          - chmod +x ./deployment-scripts/after-deploy-k8s-service-v3.sh
          - ./deployment-scripts/after-deploy-k8s-service-v3.sh
    - step: &integration-run
        name: Run integration tests
        script:
          - git clone git@bitbucket.org:nextuple_engineering/pe-api-automation.git
          - cd pe-api-automation
          - ./gradlew test -Dcucumber.filter.tags="@AutomatePECarrierServiceCalendar or @CreateCalendarAPI" -Dhost=internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,pedataupload.blob.core.windows.net,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com,internal-integration.nextuple.com -Dport=443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443,443 -Duservice=pe-postal-code-timezone,pe-calendar,pe-node-carrier,pe-node,pe-carrier-service,pe-postal-code-timezone,pe-weightage-configuration,pe-promise-sourcing-rule,pe-transit,pe-core-engine,pe-item-inventory,pe-ingest-item,azure,Pe-data-upload,inventory,pe-sourcing,weightage,pe-promise-group-definition,pe-promise-optimization_strategy,pe-item,pe-promise-sourcing-rule-ui,postal-code-timezone,custom-region,group-definition,node-group,sourcing-rules,sourcing-constraint,postal-code,pe-node,regions,pe-sourcing,core-engine,pe-configuration -Dprotocol=https,https,https,https,https,https,https,https,https,http,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https,https -DcontextPath=/promising-engine/pe-postal-code-timezone,/promising-engine/pe-calendar,/promising-engine/pe-node-carrier,/promising-engine/pe-node,/promising-engine/pe-carrier,/promising-engine/pe-postal-code-timezone,/promising-engine/pe-weightage-configuration,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-transit,/,/promising-engine/pe-data-upload/pe-webhook/ingest-data,/promising-engine/pe-data-upload/pe-webhook/ingest-data,/,/promising-engine/pe-data-upload,/services/inventory,/promising-engine/pe-sourcing,/promising-engine/pe-weightage-configuration,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-item,/promising-engine/ui,/promising-engine/pe-postal-code-timezone,/promising-engine/pe-postal-code-timezone,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-promise-sourcing-rule,/promising-engine/pe-postal-code-timezone,/promising-engine/pe-node,/promising-engine/pe-postal-code-timezone,/promising-engine/pe-sourcing,/promising-engine/pe-sourcing,/promising-engine/pe-configuration
    - step: &integration-reportgen
        name: Run report generation
        image: mcr.microsoft.com/azure-cli:2.53.1
        script:
          - az login --service-principal --username "${APP_ID}" --password "${PASSWORD}" --tenant "${TENANT_ID}" --output none
          - az aks install-cli --kubelogin-version 0.0.31
          - az account set --subscription "nextuple-nonprod-subscription"
          - az aks get-credentials --resource-group "saas-deployments-wu2" --name "nonprod-k8s-wu2-1" --file .kube/kubeconfig --overwrite-existing
          - export KUBECONFIG=.kube/kubeconfig
          - pod_name=$(kubectl get pods -n integration --selector=uservice=pe-masterdata-uservice --output=jsonpath={.items..metadata.name})
          - kubectl exec -it $pod_name -n integration -- java -jar cli.jar merge jacoco-server.exec unit.exec  --destfile output.exec
          - kubectl exec -it $pod_name -n integration -- java -jar cli.jar report output.exec --html ./report --sourcefiles src/main/java --classfiles build/classes/java/main
          - kubectl cp --retries=-1 integration/$pod_name:report report
        artifacts:
          - "report/**"

    - step: &pr-build
        name: PR Build
        caches:
          - gradle
          - sonar
          - cve
        script:
          - microdnf install git
          - microdnf install findutils
          - git clone git@bitbucket.org:nextuple_engineering/infra-automation.git
          - ./infra-automation/copySuppressions.sh
          - bash ./gradlew -Pbuild_target=SNAPSHOT clean build jacocoTestReport spotbugsMain
          - bash ./gradlew dependencyCheckAggregate --info
          - bash ./gradlew sonarqube showSonarQubeLink --info
    - step: &Clear-Cache
        name: Clear Pipeline Cache
        script:
          - pipe: atlassian/bitbucket-clear-cache:3.3.0
            variables:
              BITBUCKET_ACCESS_TOKEN: $BITBUCKET_ACCESS_TOKEN
              CACHES: ["gradle"]
pipelines:
  pull-requests:
    '**':
      - step: *Clear-Cache
      - step: *pr-build
  tags:
    '*-SNAPSHOT':
      - step: *Clear-Cache
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Dev
          deployment: dev
      - parallel:
          - step:
              !!merge <<: *deploy
              name: Deploy QA
              trigger: manual
              deployment: qa
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy PERF
          #     trigger: manual
          #     deployment: perf
    '*-SANDBOX':
      - step: *Clear-Cache
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Sandbox
          deployment: sandbox
    '*-RELEASE':
      - step: *Clear-Cache
      - step: *build-release
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
  branches:
    vapt:
      - step: *Clear-Cache
      - step: *build
      - step:
          !!merge <<: *deploy
          name: Deploy vapt
          deployment: vapt
    development:
      - step: *Clear-Cache
      - step: *build     
      - step:
          !!merge <<: *deploy
          name: Deploy Dev
          deployment: dev
      - parallel:              
          - step:
              !!merge <<: *deploy
              name: Deploy QA
              trigger: manual
              deployment: qa
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy PERF
          #     trigger: manual
          #     deployment: perf
    master:
      - step: *Clear-Cache
      - step: *build
      - parallel:
          - step:
              !!merge <<: *deploy
              name: Deploy demo
              trigger: manual
              deployment: demo
          # - step:
          #     !!merge <<: *deploy
          #     name: Deploy Pre-prod
          #     trigger: manual
          #     deployment: preprod
          - step:
              !!merge <<: *deploy
              name: Deploy SQA
              trigger: manual
              deployment: sqa          
          - step:
              !!merge <<: *deploy
              name: Deploy SDEV
              trigger: manual
              deployment: sdev
      - step:
          !!merge <<: *deploy
          name: Deploy Sandbox
          trigger: manual
          deployment: sandbox              
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
    master2:
      - step: *Clear-Cache
      - step: *build
      - step:
          !!merge <<: *deploy
          name: Deploy Demo
          trigger: manual
          deployment: demo
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
    hotfixes/*:
      - step: *Clear-Cache
      - step: *build
      - parallel:
        - step:
           !!merge <<: *deploy
           name: Deploy Pre-prod
           trigger: manual
           deployment: preprod
        - step:
           !!merge <<: *deploy
           name: Deploy SDEV
           trigger: manual
           deployment: sdev
        - step:
           !!merge <<: *deploy
           name: Deploy SQA
           trigger: manual
           deployment: sqa
      - step:
          !!merge <<: *deploy
          name: Deploy Prod
          trigger: manual
          deployment: prod
    integration:
      - step: *build
      - step:
          !!merge <<: *deploy
          name: Deploy integration
          deployment: integration
      - step: *integration-run
#      - step: *integration-reportgen
