plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-configuration-uservice:configuration-api-domain"))

    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))
    implementation("com.nextuple.pe:core-near-cache:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-spring:1.4.0-${build_target}")
    implementation(project(":pe-configuration-uservice:configuration-near-cache"))
    implementation(project(":pe-configuration-uservice:configuration-near-cache-spring"))

    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"

    constraints {
        implementation('io.github.openfeign:feign-core:11.8') {
            because 'versions below are vulnerable to CVE-2019-16942'
        }
    }
}


tasks.named('test') {
    dependsOn(':pe-configuration-uservice:configuration-api-domain:jar')
    dependsOn(':pe-configuration-uservice:configuration-near-cache:jar')
    dependsOn(':pe-configuration-uservice:configuration-near-cache-spring:jar')
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
}


tasks.test {
    useJUnitPlatform()
}