spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-production.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
    hikari:
      connectionTimeout: 5000
  replica:
    datasource:
      platform: postgres
      url: jdbc:postgresql://promise-engine-postgres-production.cluster-ro-cboxgnkbeo0q.us-east-1.rds.amazonaws.com,promise-engine-postgres-production.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig?readOnly=true
      username: \${POSTGRES_USER}
      password: \${POSTGRES_PWD}
      required: true
      hikari:
        readOnly: true
        maximumPoolSize: 20
        connectionTimeout: 5000
  kafka:
    bootstrap-servers: "loyalty-prod-bootstrap.integration.awshbc.io:9094"
    consumer-retry-count: 1
    consumer:
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: com.nextuple.item.consumer.serializer.ItemDeserializer
      topics:
        item_master:
          name: items.promise.bay.v1
          group-id: pe-item-master-prod-v1
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.ItemSerializer

logging:
  level:
    root: WARN
    com.nextuple: INFO
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_MW21O5cnf