        item_master:
          name: ITEM_MASTER_INTEGRATION
          group-id: item-master-local
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.hbc.item.consumer.serializer.ItemSerializer

logging:
  level:
    com.hbc: INFO