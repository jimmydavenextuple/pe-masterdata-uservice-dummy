spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: "localhost:9092"
    consumer-retry-count: 3
    consumer:
      enable-auto-commit: true
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: com.hbc.item.consumer.serializer.ItemDeserializer
      topics:
        item_master:
          name: local.items.promise.bay.v1
          group-id: item-master-local
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.hbc.item.consumer.serializer.ItemSerializer

logging:
  level:
    com.hbc: DEBUG