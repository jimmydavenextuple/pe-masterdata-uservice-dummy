spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-perf.cluster-co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe
    username: postgres
    password: a0756aa8-6370-4ada-99e2-a742ba5dc34b
  replica:
    datasource:
      platform: postgres
      url: jdbc:postgresql://promise-engine-postgres-perf.cluster-ro-co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe?readOnly=true
      username: postgres
      password: a0756aa8-6370-4ada-99e2-a742ba5dc34b
      required: true
      hikari:
        readOnly: true
  kafka:
    bootstrap-servers: "localhost:9092"
    consumer-retry-count: 1
    consumer:
      enable-auto-commit: true
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: com.hbc.item.consumer.serializer.ItemDeserializer
