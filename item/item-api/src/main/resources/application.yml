spring:
  config:
    import: optional:aws-secretsmanager:/secret/promise-\${SPRING_PROFILES_ACTIVE}
  application:
    name: "Item-master-data"
    version: 1.0
    title: "Item Master Data Service"
    description: "Item master data service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200

logging:
  level:
    org.springframework: WARN
    root: WARN
    com.hbc: INFO
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
      newrelic:
        enabled: true
        api-key: \${NEW_RELIC_API_KEY}
        account-id: \${NEW_RELIC_ACCOUNT_ID}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
        persistence: true
        cache: true
pe:
  ui:
    allowed-origin-url: \${PE_UI_URL}
feign:
  okhttp:
    enabled: true