spring:
  application:
    name: "Item-master-data"
    version: 1.0
    title: "Item Master Data Service"
    description: "Item master data service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200

logging:
  level:
    org.springframework: WARN
    root: INFO