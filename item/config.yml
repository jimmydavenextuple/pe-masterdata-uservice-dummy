server:
  health-check-endpoint: "/actuator/health"
  environments:
    dev:
      replicas: 1
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    qa:
      replicas: 1
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    stage:
      replicas: 3
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    perf:
      java-opts: "-Xms1536m -Xmx1536m"
      replicas: 3
      resources:
        min:
          memory: "2048Mi"
          cpu: "1000m"
        max:
          memory: "2048Mi"
          cpu: "1000m"
    hotfix:
      replicas: 1
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    prod:
      java-opts: "-Xms1536m -Xmx1536m"
      replicas: 3
      resources:
        min:
          memory: "2048Mi"
          cpu: "1000m"
        max:
          memory: "2048Mi"
          cpu: "1000m"
