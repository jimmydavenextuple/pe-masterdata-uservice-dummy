buildscript {
    repositories {
        mavenCentral()
        maven {
            url "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        classpath "org.jfrog.buildinfo:build-info-extractor-gradle:4.32.0"
        classpath "org.owasp:dependency-check-gradle:8.2.0"
        classpath "org.sonatype.gradle.plugins:scan-gradle-plugin:2.5.5"
    }
}

plugins {
    id 'java-library'
    id "org.springframework.boot" version "3.4.0"
    id "io.spring.dependency-management" version "1.1.4"
    id "org.sonarqube" version "4.4.1.3373"
    id "com.diffplug.spotless" version "6.22.0"
    id "com.github.spotbugs" version "5.2.1"

}

ext {
    build_target = project.hasProperty("build_target") ? project.build_target : "SNAPSHOT"
    mapstructVersion = "1.3.1.Final"
    commonsCsvVersion = "1.10.0"
    loadVersion = { ->
        def versionYamlFile = file('version.yml')

        if (!versionYamlFile.exists()) {
            throw new Exception('No version.yml file found')
        }

        Yaml yaml = new Yaml()
        Map versionMap = yaml.load(versionYamlFile.text)

        Boolean releaseValue = versionMap.version.release.toString().toBoolean()
        def version = new ApplicationVersion(versionMap.version.major, versionMap.version.minor, versionMap.version.patch, releaseValue)

        return [
                version: version,
                allowedVersion: versionMap.allowed_version
        ]
    }
}

java {
    sourceCompatibility = '21'
}


repositories {
    mavenCentral()
}

test {
    if (project.hasProperty('excludeTests')) {
        def excludeTests = project.excludeTests.split(',')
        excludeTests.each { excludeTest ->
            exclude '**/' + excludeTest
        }
    }

    if (project.hasProperty('includeTests')) {
        def includeTests = project.includeTests.split(',')
        includeTests.each { includeTest ->
            include '**/' + includeTest
        }
    }

    useJUnitPlatform()
}

