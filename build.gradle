import org.gradle.api.publish.maven.MavenPublication
import org.gradle.api.tasks.compile.JavaCompile

import java.util.regex.Matcher

buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        classpath "org.jfrog.buildinfo:build-info-extractor-gradle:4.15.2"
        classpath "org.owasp:dependency-check-gradle:6.1.6"
        classpath "org.sonatype.gradle.plugins:scan-gradle-plugin:1.2.4"
    }
}

plugins {
    id 'java-library'
    id "org.springframework.boot" version "2.6.0"
    id "io.spring.dependency-management" version "1.0.11.RELEASE"
    id "org.sonarqube" version "3.0"
    id "com.diffplug.spotless" version "5.7.0"
    id "com.github.spotbugs" version "4.5.1"

}

ext {
    build_target = project.hasProperty("build_target") ? project.build_target : "SNAPSHOT"
    mapstructVersion = "1.3.1.Final"
    commonsCsvVersion = "1.9.0"
}

repositories {
    mavenLocal()
    mavenCentral()
}

bootJar {
    enabled = true
    mainClass.set("com.nextuple.PeMasterDataUserviceApplication")
}

group = 'com.nextuple'
version = '0.0.1-SNAPSHOT'

dependencies {

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation "org.springframework.cloud:spring-cloud-starter-openfeign:3.1.2"
    implementation("io.github.openfeign:feign-okhttp:10.12")
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation(project(":node-services"))
    implementation(project(":carrier-services"))
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

test {
    useJUnitPlatform()
}


subprojects {
    apply from: "$rootProject.projectDir/dependencies.gradle"


    apply plugin: 'idea'
    apply plugin: 'maven-publish'
    apply plugin: "com.jfrog.artifactory"
    apply plugin: 'java-library'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: "org.springframework.boot"
    apply plugin: 'jacoco'
    apply plugin: 'org.owasp.dependencycheck'
    apply plugin: "com.github.spotbugs"
    apply plugin: "com.diffplug.spotless"
    apply plugin: "org.sonatype.gradle.plugins.scan"

    group = 'com.nextuple.pe'
    version = "1.0.0-${build_target}"

    sourceCompatibility = "${sourceJdkVersion}"
    targetCompatibility = "${targetJdkVersion}"

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }


    configurations {
        compileOnly {
            extendsFrom annotationProcessor
        }
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url = 'https://repo.maven.apache.org/m2'
        }
        maven {
            url = 'https://clojars.org/repo/'
        }
    }

    dependencyManagement {
        imports {
            mavenBom("org.springframework.boot:spring-boot-dependencies:2.6.0")
            mavenBom("org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}")
        }
    }

    dependencies {
        implementation libs.logstash

        api "org.springframework.boot:spring-boot-starter-web"
        api "org.springframework.boot:spring-boot-starter-actuator"
        implementation "org.springframework.cloud:spring-cloud-starter-openfeign:3.1.2"
        implementation("io.github.openfeign:feign-okhttp:10.12")
        implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
        implementation 'org.springframework.boot:spring-boot-starter-validation'
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
        annotationProcessor 'org.projectlombok:lombok'
        annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"
        implementation "org.mapstruct:mapstruct:${mapstructVersion}"
        implementation 'org.springframework.kafka:spring-kafka'
        implementation "org.apache.commons:commons-csv:${commonsCsvVersion}"
        api "io.micrometer:micrometer-registry-prometheus"
        implementation 'io.awspring.cloud:spring-cloud-starter-aws-secrets-manager-config:2.4.1'
        api "com.azure.spring:azure-spring-boot-starter-keyvault-secrets:3.10.0"

        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation "org.hamcrest:hamcrest-junit:${hamcrestJunitVersion}"
        testImplementation "com.jayway.jsonpath:json-path-assert:${jsonpathVersion}"
        testImplementation "com.github.javafaker:javafaker:1.0.2"
        testImplementation 'org.junit.jupiter:junit-jupiter:5.5.2'
        testImplementation 'org.junit.jupiter:junit-jupiter-api:5.5.2'
        testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.5.2'

        testImplementation 'org.mockito:mockito-inline:2.13.0'

        // Others
        testImplementation "com.github.javafaker:javafaker:0.15"

        //Caffeine
        implementation "org.springframework.boot:spring-boot-starter-cache"
        implementation "com.github.ben-manes.caffeine:caffeine"

    }

    jacocoTestReport {
        reports {
            xml.enabled true
            html.enabled true
            csv.enabled true
        }
    }

    spotbugs {
        toolVersion = '4.1.4'
        ignoreFailures = true
        onlyAnalyze = ['com.nextuple.*']
        showStackTraces = false
    }

    dependencyCheck {
        format = 'ALL'
        suppressionFile = 'suppressions.xml'
        autoUpdate = true
        cveValidForHours = 24
        if (System.getenv("CI") == 'true') {
            data {
                directory = "/root/.cve"
            }
        }
    }

    spotless {
        java {
            importOrder()
            removeUnusedImports()
            googleJavaFormat()
        }
    }

    task showSonarQubeLink {
        doLast {
            print("Checkout SonarQube report at ${getProperty("systemProp.sonar.host.url")}/dashboard?id=${getProperty("systemProp.sonar.projectKey")}\n")
        }
    }

    artifactoryPublish.skip = false

    artifactoryPublish {
        dependsOn jar
    }

    artifactory {
        contextUrl = "${artifactory_contextUrl}"
        publish {
            repository {
                repoKey = 'gradle-dev-local'
                username = "${artifactory_user}"
                password = "${artifactory_password}"
                maven = true
            }
            defaults {
                publications('mavenJava')
            }
        }
        resolve {
            repository {
                repoKey = 'gradle-dev'
                username = "${artifactory_user}"
                password = "${artifactory_password}"
                maven = true
            }
        }
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java
            }
        }
    }

    jar {
        enabled = false
        classifier('')
    }

    processResources {
        filesMatching("**/application*.yml") {
            expand(project.properties)
        }
    }

    test {
        useJUnitPlatform()
    }

    task fixPom {
        doLast {
            File file = new File("$buildDir/publications/mavenJava/pom-default.xml")
            def text = file.text
            def pattern = "(?s)(<dependencyManagement>.+?<dependencies>)(.+?)(</dependencies>.+?</dependencyManagement>)"
            Matcher matcher = text =~ pattern
            if (matcher.find()) {
                text = text.replaceFirst(pattern, "")
                def firstDeps = matcher.group(2)
                text = text.replaceFirst(pattern, '$1$2' + firstDeps + '$3')
            }
            file.write(text)
        }
    }
    generatePomFileForMavenJavaPublication.finalizedBy fixPom
}
