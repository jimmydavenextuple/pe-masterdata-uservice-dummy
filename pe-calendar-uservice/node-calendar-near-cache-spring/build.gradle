plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = false
}


jar {
    enabled = true
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.0'
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.7.0'

    implementation(project(":pe-common:common-util"))
    implementation("com.nextuple.pe:core-near-cache-consumer:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-spring:1.4.0-${build_target}")
    implementation(project(":pe-calendar-uservice:node-calendar-near-cache"))
    implementation(project(":pe-calendar-uservice:calendar-api-domain"))
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    api(project(":pe-calendar-uservice:calendar-common-near-cache"))

    constraints {
        implementation('io.github.openfeign:feign-core:11.8') {
            because 'versions below are vulnerable to CVE-2019-16942'
        }
    }
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-calendar-uservice:calendar-common-near-cache:jar'
    dependsOn ':pe-calendar-uservice:node-calendar-near-cache:jar'
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn(':pe-common:common-util:jar')
}
