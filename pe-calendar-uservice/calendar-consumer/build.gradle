plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}


jar{
    enabled = true
}

bootJar {
    enabled = false
}

dependencies {
    testImplementation(platform("org.junit:junit-bom:5.9.1"))
    testImplementation("org.junit.jupiter:junit-jupiter")
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    runtimeOnly 'org.postgresql:postgresql'
    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-domain:1.4.0-${build_target}")
    implementation("com.nextuple.pe:master-data-integration-framework:1.4.0-${build_target}")
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation "jakarta.validation:jakarta.validation-api:3.0.2"
    implementation(project(":pe-calendar-uservice:calendar-api-domain"))
    implementation(project(":pe-calendar-uservice:calendar-services"))

    implementation(project(":pe-calendar-uservice:calendar-persistence-domain"))
    implementation(project(":pe-calendar-uservice:calendar-persistence-postgres"))

}

tasks.test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-calendar-uservice:calendar-services:jar'
    dependsOn ':pe-calendar-uservice:calendar-persistence-domain:jar'
    dependsOn ':pe-calendar-uservice:calendar-persistence-postgres:jar'
    dependsOn ':pe-node-uservice:node-api-domain:jar'

}

