bootJar {
    enabled = true
    mainClass.set("com.hbc.postal.code.timezone.PostalCodeTimezoneApplication")
}


configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}


dependencies {
    implementation(project(":postal-code-timezone:postal-code-timezone-api-domain"))
    implementation(project(":common-util"))
    implementation project(":common:common-postgres")
    implementation 'com.vladmihalcea:hibernate-types-52:2.16.2'
    implementation(project(":nfs-near-cache:core-near-cache-producer"))
    runtimeOnly 'org.postgresql:postgresql'
}
sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11
