plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = true
    mainClass.set("com.nextuple.node.MasterDataNodeApplication")
}

configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":pe-node-uservice:node-services"))
    implementation(project(":pe-node-uservice:node-api-domain"))
    runtimeOnly 'org.postgresql:postgresql:42.7.2'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
}
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-configuration-uservice:configuration-api-domain:jar'
    dependsOn ':pe-node-uservice:node-persistence-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

tasks.named('bootJar') {
    mustRunAfter(':pe-configuration-uservice:configuration-api-domain:jar')
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-node-uservice:node-persistence-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

