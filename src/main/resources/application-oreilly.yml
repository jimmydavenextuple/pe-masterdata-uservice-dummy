next-cache:
  caches:
    -
      cacheName: task-info
      ttlSeconds: 14400
      maxLimit: 50
  refresh-cache:
    topic: INTERNAL.OREILLY.PE.REFRESH_CACHE_INV
  cacheManager: caffeine
platform:
  tasks:
    enabled: true
  tasks-scheduler:
    enabled: true
    milliseconds: 5000
  authFilter:
    enabled: false
kafka:
  input:
    taskTopics: INTERNAL.OREILLY.PE.RETRY_TOPIC_INV
    taskGroupId: pe-retry