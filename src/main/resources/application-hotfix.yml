jobs-framework:
  feed-metrics-consumer:
    topic-name: INTERNAL.HOTFIX.PE_JOB_FPM_METRICS, INTERNAL.HOTFIX.PE_JOB_RECORD_FPM_METRICS, INTERNAL.HOTFIX.PE_NEIP_FPM_METRICS
    group-id: pe-fpm-metrics-hotfix
  job-completion-consumer:
    topic-name: internal-hotfix-job-completion
  kafka-publish:
    topic-name: INTERNAL.HOTFIX.JOBS.TASK
  result-publish:
    topic-name: INTERNAL.HOTFIX.JOBS.RESULT
  result-consumer:
    topic-name: INTERNAL.HOTFIX.JOBS.RESULT
    group-id: jobs-result-consumer-async-hotfix
  record-consumer:
    topic-names: INTERNAL.HOTFIX.JOBS.TASK
    group-id: jobs-task-consumer-async-hotfix
