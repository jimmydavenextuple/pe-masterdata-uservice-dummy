next-cache:
  caches:
    -
      cacheName: task-info
      ttlSeconds: 14400
      maxLimit: 50
  refresh-cache:
    topic: INTERNAL.HOTFIX.PE.REFRESH_CACHE_INV
  cacheManager: caffeine
platform:
  tasks:
    enabled: true
  tasks-scheduler:
    enabled: true
    milliseconds: 5000
  authFilter:
    enabled: false
neo-platform:
  auth-injector:
    token-strategy: generate
    filter:
      enabled: true
    client-uri-mappings:
      my-client: /**
  auth-validator:
    application-name: pe-masterdata
    header:
      tenant-id: x-tenant-id
    issuer-uri: https://keycloak-nonprod.nextuple.com/realms/noms-dev
    authz-config:
      config-path: "http://plt-authz-config-uservice:8080/authz-config/api/configurations/groups/application-group/scope-id/pe-masterdata"
      refresh-interval-mins: 30
      role:
        json-paths: \$.resource_access.tenantclient-nextuple.roles,\$.resource_access.tenantclient-kohls.roles,\$.resource_access.tenantclient-xyzinc.roles,\$.resource_access.tenantclient-abcinc.roles,\$.resource_access.tenantclient-neednow.roles,\$.resource_access.tenantclient-ctppt.roles,\$.resource_access.applicationclient-pe-masterdata-uservice.roles,\$.resource_access.applicationclient-pe-core-uservice.roles,\$.resource_access.applicationclient-pe-iv-cache.roles,\$.resource_access.applicationclient-pe-capacity-uservice.roles,\$.resource_access.applicationclient-pe-neip-uservice.roles
kafka:
  input:
    taskTopics: INTERNAL.HOTFIX.PE.RETRY_TOPIC_INV
    taskGroupId: pe-retry