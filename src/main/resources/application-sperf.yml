  result-publish:
    topic-name: INTERNAL.SPERF.PE.JOB_RESULT
  result-consumer:
    topic-name: INTERNAL.SPERF.PE.JOB_RESULT
    group-id: jobs-result-consumer-async
  record-consumer:
    topic-name: INTERNAL.SPERF.PE.JOB_TASK
    group-id: jobs-task-consumer-async
  plt-neip:
