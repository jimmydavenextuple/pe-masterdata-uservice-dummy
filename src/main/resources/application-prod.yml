spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: \${PE-POSTGRES-URI}
    username: \${PE-COMMON-POSTGRES-USER}
    password: \${PE-COMMON-POSTGRES-PASSWORD}
    hikari:
      connectionTimeout: 5000
  flyway:
    enabled: false
  replica:
    datasource:
      platform: postgres
      url: \${PE-POSTGRES-URI}
      username: \${PE-COMMON-POSTGRES-USER}
      password: \${PE-COMMON-POSTGRES-PASSWORD}
      required: true
      hikari:
        readOnly: true
        connectionTimeout: 5000
        maximumPoolSize: 30
  kafka:
    bootstrap-servers: \${PE-KAFKA-BROKER-URI}
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: \${PE-COMMON-KAFKA-CONFIG}
    consumer-retry-count: 1
    # NOTE: Below commented code is for the Avro consumer.
    # If we need to consume an avro record, please uncomment Avro properties and comment out the JSON Consumer and Producer.
    #
    #    consumer:
    #      type: avro
    #      enable-auto-commit: true
    #      auto-offset-reset: latest
    #      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    #      value-deserializer: com.nextuple.item.consumer.serializer.ItemDeserializer
    #      topics:
    #        item_master:
    #          name: INTERNAL.PROD.PE.PROMISE_ITEMS
    #          group-id: item-master-prod
    #    producer:
    #      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    #      value-serializer: com.nextuple.item.consumer.serializer.ItemSerializer
    consumer-item:
      type: json
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        spring-json-type-mapping: com.nextuple.pe.webhook.domain.dtos.Item:com.nextuple.item.domain.events.ItemMasterEvent
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        item_master:
          name: INTERNAL.PROD.PE.PROMISE_ITEMS
          group-id: item-master-prod-\${random.value}
    producer-item:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.JsonSerializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.PROD.PE.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: 1
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        master_data_update_event:
          name: INTERNAL.PROD.PE.MASTER_DATA_UPDATE_EVENTS
          group-id: master-data-update-prod
    consumer-string:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
      trusted-packages: "*"
      interceptor-classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      enable-auto-commit: true
      auto-offset-reset: latest


logging:
  level:
    com.nextuple: INFO
pe-public-webhook:
  iv-feed:
    topic: INTERNAL.PROD.PE.ATP
  item-feed:
    topic: INTERNAL.PROD.PE.PROMISE_ITEMS
  pe-response:
    topic: INTERNAL.PROD.PE.CART_EDD
    group-id: pe-response-consumer-async
dataupload:
  base-path: "https://pesignetprod.blob.core.windows.net"
  maxsize-in-kilobytes: 10240
  max-rows: 1000
  bucket-name: "peproddataupload"
  type: BLOB
  signed-url-expiry-minutes: 30

jobs-framework:
  job-completion-consumer:
    topic-name: INTERNAL.PROD.PE.JOB_COMPLETION
    group-id: jobs-completion-consumer-async-prod
  kafka-publish:
    topic-name: INTERNAL.PROD.PE.JOB_TASK
  result-publish:
    topic-name: INTERNAL.PROD.PE.JOB_RESULT
  result-consumer:
    topic-name: INTERNAL.PROD.PE.JOB_RESULT
    group-id: jobs-result-consumer-async
  record-consumer:
    topic-name: INTERNAL.PROD.PE.JOB_TASK
    group-id: jobs-task-consumer-async