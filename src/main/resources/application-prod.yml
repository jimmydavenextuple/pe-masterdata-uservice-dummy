spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-production.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
    hikari:
      maximumPoolSize: 30
      connectionTimeout: 5000
  replica:
    datasource:
      platform: postgres
      url: jdbc:postgresql://promise-engine-postgres-production.cluster-ro-cboxgnkbeo0q.us-east-1.rds.amazonaws.com,promise-engine-postgres-production.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig?readOnly=true
      username: \${POSTGRES_USER}
      password: \${POSTGRES_PWD}
      required: true
      hikari:
        readOnly: true
        maximumPoolSize: 30
        connectionTimeout: 5000
  kafka:
    bootstrap-servers: "b-3.promisemksproduction.wo9ili.c19.kafka.us-east-1.amazonaws.com:9096,b-1.promisemksproduction.wo9ili.c19.kafka.us-east-1.amazonaws.com:9096,b-2.promisemksproduction.wo9ili.c19.kafka.us-east-1.amazonaws.com:9096"
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"\${KAFKA_USER}\" password=\"\${KAFKA_PWD}\";"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.PROD.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: 1
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    consumer-string:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
      trusted-packages: "*"
      interceptor-classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      enable-auto-commit: true
      auto-offset-reset: latest

logging:
  level:
    root: WARN
    com.nextuple: INFO
pe-public-webhook:
  iv-feed:
    topic: INTERNAL.PROD_ATP
  item-feed:
    topic: INTERNAL.PROD.PROMISE_ITEMS
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_MW21O5cnf
dataupload:
  base-path: "https://pedataupload.blob.core.windows.net"
  maxsize-in-kilobytes: 10240
  max-rows: 1000
  bucket-name: "dataupload"
  type: BLOB
  signed-url-expiry-minutes: 30

jobs-framework:
  job-completion-consumer:
    topic-name: internal-prod-job-completion
  kafka-publish:
    topic-name: INTERNAL.PROD.JOBS.TASK
  result-publish:
    topic-name: INTERNAL.PROD.JOBS.RESULT
  result-consumer:
    topic-name: INTERNAL.PROD.JOBS.RESULT
    group-id: jobs-result-consumer-async-prod
  record-consumer:
    topic-name: INTERNAL.PROD.JOBS.TASK
    group-id: jobs-task-consumer-async-prod
auth-token:
  url: https://promise-engine-domain-production.auth.us-east-1.amazoncognito.com
  username: \${COGNITO_CLIENT_ID}
  password: \${COGNITO_CLIENT_SECRET}