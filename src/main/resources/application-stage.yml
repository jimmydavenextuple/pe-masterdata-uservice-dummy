spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-cluster-stage.cluster-co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
  kafka:
    bootstrap-servers: "b-2.promisemksstage.hwe2x6.c18.kafka.us-east-1.amazonaws.com:9096,b-1.promisemksstage.hwe2x6.c18.kafka.us-east-1.amazonaws.com:9096,b-3.promisemksstage.hwe2x6.c18.kafka.us-east-1.amazonaws.com:9096"
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"\${KAFKA_USER}\" password=\"\${KAFKA_PWD}\";"
    consumer-item:
      type: json
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        spring-json-type-mapping: com.nextuple.pe.webhook.domain.dtos.Item:com.nextuple.item.domain.events.ItemMasterEvent
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        item_master:
          name: INTERNAL.STAGE.PROMISE_ITEMS
          group-id: item-master-stage
    producer-item:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.JsonSerializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.STAGE.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: 1
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    consumer-string:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
      trusted-packages: "*"
      interceptor-classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      enable-auto-commit: true
      auto-offset-reset: latest
logging:
  level:
    com.nextuple: DEBUG
pe-public-webhook:
  iv-feed:
    topic: INTERNAL.STAGE_ATP
  item-feed:
    topic: INTERNAL.STAGE.PROMISE_ITEMS
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_5uCQJb6Il

dataupload:
  base-path: "https://pedataupload.blob.core.windows.net"
  maxsize-in-kilobytes: 10240
  max-rows: 1000
  bucket-name: "dataupload"
  type: BLOB
  signed-url-expiry-minutes: 30

jobs-framework:
  job-completion-consumer:
    topic-name: internal-stage-job-completion
  kafka-publish:
    topic-name: INTERNAL.STAGE.JOBS.TASK
  result-publish:
    topic-name: INTERNAL.STAGE.JOBS.RESULT
  result-consumer:
    topic-name: INTERNAL.STAGE.JOBS.RESULT
    group-id: jobs-result-consumer-async-stage
  record-consumer:
    topic-name: INTERNAL.STAGE.JOBS.TASK
    group-id: jobs-task-consumer-async-stage
auth-token:
  url: https://promise-engine-domain-stage.auth.us-east-1.amazoncognito.com
  username: \${COGNITO_CLIENT_ID}
  password: \${COGNITO_CLIENT_SECRET}