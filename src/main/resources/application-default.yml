  maxsize-in-kilobytes: 10240
  max-rows: 1000
  bucket-name: "dataupload"
  type: BLOB
  signed-url-expiry-minutes: 30

master-data:
  node:
    topic-name: INTERNAL.DEV.PE.NODE_INTEGRATION
    group-id: node-master-dev
  node-carrier:
    topic-name: INTERNAL.DEV.PE.NODE_CARRIER_INTEGRATION
    group-id: node-carrier-master-dev
  carrier:
    topic-name: INTERNAL.DEV.PE.CARRIER_INTEGRATION
    group-id: carrier-master-dev
  processing-lead-time:
    topic-name: INTERNAL.DEV.PE.PROCESSING_LEAD_TIME_INTEGRATION
    group-id: processing-lead-time-master-dev
  calendar:
    topic-name: INTERNAL.DEV.PE.CALENDAR_INTEGRATION
    group-id: calendar-master-dev
  node-calendar:
    topic-name: INTERNAL.DEV.PE.NODE_CALENDAR_INTEGRATION
    group-id: node-calendar-master-dev
  carrier-service-calendar:
    topic-name: INTERNAL.DEV.PE.CARRIER_SERVICE_CALENDAR_INTEGRATION
