spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: "localhost:9092"
    consumer-retry-count: 1
    # NOTE: Below commented code is for the Avro consumer.
    # If we need to consume an avro record, please uncomment Avro properties and comment out the JSON Consumer and Producer.
    #
    #    consumer:
    #      type: avro
    #      enable-auto-commit: true
    #      auto-offset-reset: latest
    #      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    #      value-deserializer: com.nextuple.item.consumer.serializer.ItemDeserializer
    #      topics:
    #        item_master:
    #          name: INTERNAL.DEV.PROMISE_ITEMS
    #          group-id: item-master-dev
    #    producer:
    #      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    #      value-serializer: com.nextuple.item.consumer.serializer.ItemSerializer
    consumer-item:
      type: json
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        spring.json.type.mapping: com.nextuple.pe.webhook.domain.dtos.Item:com.nextuple.item.domain.events.ItemMasterEvent
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        item_master:
          name: ITEM_MASTER_INTEGRATION
          group-id: item-master-local
    producer-item:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.JsonSerializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "*"
        acks: 1
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"

logging:
  level:
    com.nextuple: INFO
entity-listener:
  kafka:
    enabled: false
pe:
  ui:
    allowed-origin-url: "*"

jobs-framework:
  job-completion-consumer:
    topic-name: job-completion-local
    group-id: jobs-completion-consumer-async-dev
  kafka-publish:
    topic-name: jobs-task-local
  result-publish:
    topic-name: jobs-result-local
  result-consumer:
    topic-name: jobs-result-local
    group-id: jobs-result-consumer-async-local
  record-consumer:
    topic-name: jobs-task-local
    group-id: jobs-task-consumer-async-local

pe-public-webhook:
  iv-feed:
    topic: INTERNAL.DEV_ATP
  item-feed:
    topic: ITEM_MASTER_INTEGRATION

dataupload:
  base-path: "https://pedataupload.blob.core.windows.net"
  maxsize-in-kilobytes: 10240
  max-rows: 1000
  bucket-name: "dataupload"
  type: BLOB
  signed-url-expiry-minutes: 30