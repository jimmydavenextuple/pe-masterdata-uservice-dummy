server:
  port: 8082
spring:
  application:
    dependencies:
      item: "http://localhost:8082/"
      node-carrier: "http://localhost:8082/"
      carrier: "http://localhost:8082/"
      transit: "http://localhost:8082/"
      data-upload: "http://localhost:8082/"
      node: "http://localhost:8082/"
      promise-sourcing-rule: "http://localhost:8082/"
      calendar: "http://localhost:8082/"
      postal-code-timezone: "http://localhost:8082/"
      weightage-configuration: "http://localhost:8082/"
      userexit: "http://localhost:8082/"
      configuration: "http://localhost:8082/"
      fpm-service: "http://localhost:8082/"
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://postgres:5432/postgres
    username: postgres
    password: postgres
    hikari:
      maximumPoolSize: 100
      minimumIdle: 10
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: "kafka:9092"
    properties:
      security.protocol: PLAINTEXT
      sasl.mechanism: NA
      sasl.jaas.config: NA
    consumer-retry-count: 1
    # NOTE: Below commented code is for the Avro consumer.
    # If we need to consume an avro record, please uncomment Avro properties and comment out the JSON Consumer and Producer.
    #
    #    consumer:
    #      type: avro
    #      enable-auto-commit: true
    #      auto-offset-reset: latest
    #      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    #      value-deserializer: com.nextuple.item.consumer.serializer.ItemDeserializer
    #      topics:
    #        item_master:
    #          name: INTERNAL.DEV.PROMISE_ITEMS
    #          group-id: item-master-dev
    #    producer:
    #      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    #      value-serializer: com.nextuple.item.consumer.serializer.ItemSerializer
    consumer-item:
      type: json
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        spring-json-type-mapping: com.nextuple.pe.webhook.domain.dtos.Item:com.nextuple.item.domain.events.ItemMasterEvent
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        item_master:
          name: ITEM_MASTER_INTEGRATION
          group-id: item-master-local
    producer-item:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.JsonSerializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "*"
        acks: 1
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
        max.poll.records: 10
    consumer-string:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
      trusted-packages: "*"
      interceptor-classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      enable-auto-commit: true
      auto-offset-reset: latest
  sql.init.platform: postgres

logging:
  level:
    com.nextuple: INFO
entity-listener:
  kafka:
    enabled: false
pe:
  ui:
    allowed-origin-url: "*"

jobs-framework:
  feed-metrics-consumer:
    topic-name: INTERNAL.DEV.PE_JOB_FPM_METRICS_LOCAL, INTERNAL.DEV.PE_JOB_RECORD_FPM_METRICS_LOCAL, INTERNAL.DEV.PE_NEIP_FPM_METRICS_LOCAL
    group-id: pe-fpm-metrics-local
  job-completion-consumer:
    topic-name: job-completion-local
    group-id: jobs-completion-consumer-async-dev
  kafka-publish:
    topic-name: jobs-task-local
  result-publish:
    topic-name: jobs-result-local
  result-consumer:
    topic-name: jobs-result-local
    group-id: jobs-result-consumer-async-local
  record-consumer:
    topic-name: jobs-task-local
    group-id: jobs-task-consumer-async-local

