spring:
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfiguration
  security:
    oauth2:
      client:
        registration:
          my-client:
            client-id: applicationclient-pe-masterdata-uservice
            client-secret: \${MASTER-DATA-KEYCLOAK-CLIENT-ID} # Replace for local testing
            authorization-grant-type: client_credentials
            scope: applicationclient-pe-masterdata-scope
        provider:
          my-client:
            token-uri: https://keycloak-nonprod.nextuple.com/realms/noms-dev/protocol/openid-connect/token
  application:
    dependencies:
      item: "http://localhost:8080/"
      node-carrier: "http://localhost:8080/"
      carrier: "http://localhost:8080/"
      transit: "http://localhost:8080/"
      data-upload: "http://localhost:8080/"
      node: "http://localhost:8080/"
      promise-sourcing-rule: "http://localhost:8080/"
      calendar: "http://localhost:8080/"
      postal-code-timezone: "http://localhost:8080/"
      weightage-configuration: "http://localhost:8080/"
      userexit: "http://localhost:8080/"
      configuration: "http://localhost:8080/"
      vendor: "http://localhost:8080/"
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/pe
    username: postgres
    password: postgres
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: "localhost:9092"
    properties:
      security.protocol: PLAINTEXT
      sasl.mechanism: NA
      sasl.jaas.config: NA
    consumer-retry-count: 1
    # NOTE: Below commented code is for the Avro consumer.
    # If we need to consume an avro record, please uncomment Avro properties and comment out the JSON Consumer and Producer.
    #
    #    consumer:
    #      type: avro
    #      enable-auto-commit: true
    #      auto-offset-reset: latest
    #      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    #      value-deserializer: com.nextuple.item.consumer.serializer.ItemDeserializer
    #      topics:
    #        item_master:
    #          name: INTERNAL.TEST_CONTAINER.PROMISE_ITEMS
    #          group-id: item-master-testcontainer
    #    producer:
    #      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    #      value-serializer: com.nextuple.item.consumer.serializer.ItemSerializer
    consumer-item:
      type: json
      enable-auto-commit: true
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring-deserializer-key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
        spring-deserializer-value-delegate-class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring-json-trusted-packages: "*"
        spring-json-type-mapping: com.nextuple.pe.webhook.domain.dtos.Item:com.nextuple.item.domain.events.ItemMasterEvent
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      topics:
        item_master:
          names: INTERNAL.TEST_CONTAINER.PROMISE_ITEMS
          group-id: item-master-testcontainer
    producer-item:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.nextuple.item.consumer.serializer.JsonSerializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.TEST_CONTAINER.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: 1
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaProducerContextInterceptor"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        interceptor.classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
        max.poll.records: 10
      topics:
        master_data_update_event:
          name: INTERNAL.TEST_CONTAINER.MASTER_DATA_UPDATE_EVENTS
          group-id: master-data-update-dev
    consumer-string:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-delegate-class: org.apache.kafka.common.serialization.StringDeserializer
      trusted-packages: "*"
      interceptor-classes: "com.nextuple.common.interceptor.KafkaConsumerContextInterceptor"
      enable-auto-commit: true
      auto-offset-reset: latest
  sql.init.platform: postgres
  test:
    context:
      failure-threshold: 5
logging:
  level:
    com.nextuple: DEBUG
    root: INFO
entity-listener:
  kafka:
    enabled: false
