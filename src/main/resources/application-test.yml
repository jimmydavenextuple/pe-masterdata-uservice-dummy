          x-api-key: "PMAK-649a7ee4b2aa120030dfba82-4fe9121cae4c8059978d6e49f996cbefeb"
          #          Dummy API Key
    - tenantId: XYZINC
      moduleName: PROMISING
      webhookName: PROMISING_INTERMEDIATE_EVENT
      webhookDetail:
        endpoint: "https://dc5647e2-a0d6-436b-bfba-6097594abe60.mock.pstmn.io"
        method: POST
        headers:
          contentType: "application/json"
          x-api-key: "PMAK-649a7ee4b2aa120030dfba82-4fe9121cae4c8059978d6e49f996cbefeb"
