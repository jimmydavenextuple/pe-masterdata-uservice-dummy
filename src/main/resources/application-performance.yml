next-cache:
  caches:
    -
      cacheName: task-info
      ttlSeconds: 14400
      maxLimit: 50
  refresh-cache:
    topic: INTERNAL.PERF.PE.REFRESH_CACHE_INV
  cacheManager: caffeine
platform:
  tasks:
    enabled: true
  tasks-scheduler:
    enabled: true
    milliseconds: 5000
  authFilter:
    enabled: false
neo-platform:
  auth-injector:
    enabled: true
    token-strategy: generate
    filter:
      enabled: true
    client-uri-mappings:
      my-client: /**
  auth-validator:
    enabled: true
    application-name: pe-masterdata
    header:
      tenant-id: x-tenant-id
    issuer-uri: https://keycloak-performance.nextuple.com/realms/noms-perf
    authz-config:
      config-path: "https://internal-performance.nextuple.com/services/authz-config/api/configurations/groups/application-group/scope-id/pe-masterdata"
      refresh-interval-mins: 30
      role:
        json-paths: \$.resource_access.tenantclient-nextuple.roles,\$.resource_access.applicationclient-pe-masterdata-uservice.roles,\$.resource_access.applicationclient-pe-core-uservice.roles,\$.resource_access.applicationclient-pe-iv-cache.roles,\$.resource_access.applicationclient-pe-capacity-uservice.roles,\$.resource_access.applicationclient-pe-neip-uservice.roles,\$.resource_access.tenantclient-nextupleperf.roles,\$.resource_access.tenantclient-nextuplemed.roles
kafka:
  input:
    taskTopics: INTERNAL.PERF.PE.RETRY_TOPIC_INV
    taskGroupId: pe-retry

