bootJar {
    enabled(true)
    mainClass.set("com.nextuple.pe.masterdata.calendar.MasterDataCalendarApplication")
}
configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}
dependencies {
    implementation(project(":common-util"))
    implementation(project(":calendar:calendar-api-domain"))
    implementation 'com.vladmihalcea:hibernate-types-52:2.16.2'
    implementation(project(":nfs-near-cache:core-near-cache-producer"))
    implementation project(":common:common-postgres")
    implementation(project(":carrier:carrier-api-domain"))
    implementation(project(":node:node-api-domain"))

    runtimeOnly 'org.postgresql:postgresql'
}

sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11
