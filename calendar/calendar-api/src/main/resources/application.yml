spring:
  application:
    name: "master-data-calendar-uservice"
    version: 1.0
    title: "Master Data Calendar Service"
    description: "Master data calendar service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200

constants:
  defaultNumberOfDaysInFuture: 10
auth:
  filter-enabled: true
  roles: ADMIN
  issuer: https://pe-dev-issuer.s3.amazonaws.com/

logging:
  level:
    org.springframework: WARN
    root: INFO

