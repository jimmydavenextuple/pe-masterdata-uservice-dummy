spring:
  config:
    import: optional:aws-secretsmanager:/secret/\${SPRING_PROFILES_ACTIVE}
  application:
    name: "master-data-calendar-uservice"
    version: 1.0
    title: "Master Data Calendar Service"
    description: "Master data calendar service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200

constants:
  default-number-of-days-in-future: 45

logging:
  level:
    org.springframework: WARN
    root: WARN
    com.hbc: INFO
entity-listener:
  kafka:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: false
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: false
      newrelic:
        enabled: true
        api-key: \${NEW_RELIC_API_KEY}
        account-id: \${NEW_RELIC_ACCOUNT_ID}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
        persistence: true
        cache: true
pe:
  ui:
    allowed-origin-url: \${PE_UI_URL}