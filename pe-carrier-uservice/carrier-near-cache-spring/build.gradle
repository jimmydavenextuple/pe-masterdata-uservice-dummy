plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = false
}

jar {
    enabled = true
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.0'
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.7.0'

    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-spring:1.4.0-${build_target}")
    implementation(project(":pe-carrier-uservice:carrier-near-cache"))
    implementation(project(":pe-carrier-uservice:carrier-api-domain"))

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    constraints {
        implementation('io.github.openfeign:feign-core:11.8') {
            because 'versions below are vulnerable to CVE-2019-16942'
        }
    }
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-carrier-uservice:carrier-persistence-domain:jar',':pe-carrier-uservice:carrier-api-domain:jar',':pe-carrier-uservice:carrier-persistence-postgres:jar',
            ':pe-carrier-uservice:carrier-near-cache:jar'
}

tasks.named('test') {
    mustRunAfter project(':pe-carrier-uservice:carrier-api-domain').tasks.named('jar')
    mustRunAfter project(':pe-carrier-uservice:carrier-near-cache').tasks.named('jar')
}


tasks.test {
    useJUnitPlatform()
}