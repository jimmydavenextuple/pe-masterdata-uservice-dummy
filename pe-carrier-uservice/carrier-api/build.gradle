plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = true
    mainClass.set("com.nextuple.carrier.MasterDataCarrierApplication")
}

configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":pe-carrier-uservice:carrier-api-domain"))
    implementation(project(":pe-carrier-uservice:carrier-services"))
    implementation(project(":pe-node-carrier-uservice:node-carrier-api-domain"))
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))

    api "com.azure.spring:azure-spring-boot-starter-keyvault-secrets:3.10.0"
}

sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.bootJar {
    dependsOn(':pe-common:common-util:jar')
    dependsOn(':pe-common:common-postgres:jar')
    dependsOn(':pe-common:common-domain:jar')
    dependsOn(':pe-common:nfs-near-cache:core-near-cache-producer:jar')
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

tasks.named('test') {
    dependsOn(':pe-common:common-util:jar')
    dependsOn(':pe-common:common-postgres:jar')
    dependsOn(':pe-common:common-domain:jar')
    dependsOn(':pe-common:nfs-near-cache:core-near-cache-producer:jar')
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
    dependsOn ':pe-carrier-uservice:carrier-services:jar'
    dependsOn ':pe-carrier-uservice:carrier-persistence-postgres:jar'
    dependsOn ':pe-carrier-uservice:carrier-persistence-domain:jar'
    dependsOn ':pe-node-carrier-uservice:node-carrier-api-domain:jar'
}
