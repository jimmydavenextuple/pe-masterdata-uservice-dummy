apiVersion: v1
kind: Service
metadata:
  name: <SERVICE_NAME>
  namespace: <ENVIRONMENT>
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb-ip"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-name: "<NLB_NAME>"
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "application=promise, application_disposition=digital, compliance=non-sensitive, exposure=private, owner=sivareddy.yeruva@hbc.com, environment=<ENV_TAG>"
  labels:
    uservice: <SERVICE_NAME>
    version: "<SERVICE_VERSION>"
    color: <COLOR>
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    uservice: <SERVICE_NAME>
    version: "<SERVICE_VERSION>"
    color: <COLOR>