apiVersion: apps/v1
kind: Deployment
metadata:
  name: <SERVICE_NAME>-<COLOR>
  namespace: <ENVIRONMENT>
spec:
  selector:
    matchLabels:
      uservice: <SERVICE_NAME>
      version: <SERVICE_VERSION>
      color: <COLOR>
  replicas: <REPLICAS>
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        uservice: <SERVICE_NAME>
        version: <SERVICE_VERSION>
        color: <COLOR>
    spec:
      containers:
        - name: <SERVICE_NAME>
          image: "<IMAGE_NAME>"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "<MIN_MEM>"
              cpu: "<MIN_CPU>"
            limits:
              memory: "<MAX_MEM>"
              cpu: "<MAX_CPU>"
          readinessProbe:
            httpGet:
              path: "<HEALTH_CHECK_PATH>"
              port: 8080
            initialDelaySeconds: 100
            failureThreshold: 1
            timeoutSeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: "<HEALTH_CHECK_PATH>"
              port: 8080
            initialDelaySeconds: 200
            failureThreshold: 3
            timeoutSeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: "<HEALTH_CHECK_PATH>"
              port: 8080
            failureThreshold: 60
            periodSeconds: 10
          env:
            - name: CLUSTER_REGION
              value: "<CLUSTER_REGION>"
            - name: SPRING_PROFILES_ACTIVE
              value: "<ENVIRONMENT>"
            - name: SERVICE_NAME
              value: "<SERVICE_NAME>"
            - name: SERVICE_VERSION
              value: "<SERVICE_VERSION>"
            - name: NEW_RELIC_APP_NAME
              value: "<SERVICE_NAME>"
            - name: NEW_RELIC_LICENSE_KEY
              value: "<NEW_RELIC_LICENSE_KEY>"
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: username
            - name: KAFKA_PWD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: password
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password