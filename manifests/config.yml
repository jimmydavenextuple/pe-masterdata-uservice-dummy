server:
  health-check-endpoint: "/actuator/health"
  environments:
    dev:
      replicas: 1
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    qa:
      replicas: 1
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    stage:
      replicas: 3
      resources:
        min:
          memory: "512Mi"
          cpu: "256m"
        max:
          memory: "512Mi"
          cpu: "256m"
    perf:
      java-opts: "-Xms768m -Xmx768m"
      replicas: 3
      resources:
        min:
          memory: "1024Mi"
          cpu: "500m"
        max:
          memory: "1024Mi"
          cpu: "500m"
