plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":sourcing-cost-config-api-domain"))
    implementation(project(":promise-sourcing-rule-api-domain"))
    implementation(project(":promise-sourcing-rule-persistence-domain"))
    implementation(project(":promise-sourcing-rule-persistence-postgres"))

    implementation("com.nextuple.pe:common-domain:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-producer:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")

//    implementation("com.nextuple.pe:configuration-api-domain:1.4.0-${build_target}")
    implementation(project(":configuration-api-domain"))

    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation 'com.scireum:parsii:4.0'
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':sourcing-cost-config-api-domain:jar'
    dependsOn ':promise-sourcing-rule-persistence-postgres:jar'
    dependsOn ':promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':promise-sourcing-rule-api-domain:jar'
    dependsOn ':configuration-api-domain:jar'
}
