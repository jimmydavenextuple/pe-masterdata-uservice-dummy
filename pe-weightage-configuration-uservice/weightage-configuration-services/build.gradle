plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-api-domain"))
    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-domain:1.4.0-${build_target}")
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation("com.nextuple.pe:core-near-cache-producer:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-persistence-domain"))
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-persistence-postgres"))
    runtimeOnly 'org.postgresql:postgresql'

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn(
            ':pe-weightage-configuration-uservice:weightage-configuration-persistence-postgres:jar',
            ':pe-weightage-configuration-uservice:weightage-configuration-persistence-domain:jar',
            ':pe-weightage-configuration-uservice:weightage-configuration-api-domain:jar'
    )
}