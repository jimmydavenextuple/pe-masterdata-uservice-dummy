plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-api-domain"))
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-domain"))
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-persistence-domain"))
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-persistence-postgres"))
    runtimeOnly 'org.postgresql:postgresql'

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn(
            ':pe-weightage-configuration-uservice:weightage-configuration-persistence-postgres:jar',
            ':pe-weightage-configuration-uservice:weightage-configuration-persistence-domain:jar',
            ':pe-weightage-configuration-uservice:weightage-configuration-api-domain:jar'
    )
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}