plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar.enabled=true

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-api-domain"))
    implementation(project(":pe-common:common-util"))
    implementation("com.nextuple.pe:core-near-cache:1.4.0-${build_target}")
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn(
            ':pe-weightage-configuration-uservice:weightage-configuration-near-cache:jar',
            ':pe-weightage-configuration-uservice:weightage-configuration-api-domain:jar'

    )
}