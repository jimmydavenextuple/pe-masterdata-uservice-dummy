plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = true
    mainClass.set("com.nextuple.promise.sourcing.rule.PromiseSourcingRuleApplication")
}


configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":promise-sourcing-rule-services"))
    implementation(project(":promise-sourcing-rule-api-domain"))
    implementation(project(":node-api-domain"))
    implementation(project(":postal-code-timezone-api-domain"))

    implementation(project(":sourcing-cost-config-services"))
    implementation(project(":sourcing-cost-config-api-domain"))

    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation("com.nextuple.pe:core-near-cache-producer:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
//    implementation("com.nextuple.pe:node-api-domain:1.4.0-${build_target}")
//    implementation("com.nextuple.pe:postal-code-timezone-api-domain:1.4.0-${build_target}")
}
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('bootJar') {
    dependsOn ':node-api-domain:jar'
    dependsOn ':postal-code-timezone-api-domain:jar'
    dependsOn ':configuration-api-domain:jar'
    dependsOn ':promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':promise-sourcing-rule-api-domain:jar'
}

tasks.named('test') {
    dependsOn ':node-api-domain:jar'
    dependsOn ':postal-code-timezone-api-domain:jar'
    dependsOn ':configuration-api-domain:jar'
    dependsOn ':promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':promise-sourcing-rule-api-domain:jar'
}

