spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://qa-db.co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: "b-1.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9092,b-2.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9092,b-3.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9092"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.QA.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: all
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"

logging:
  level:
    com.hbc: DEBUG