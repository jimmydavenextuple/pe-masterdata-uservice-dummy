spring:
  servlet:
    multipart:
      max-file-size: 2048KB
      max-request-size: 3072KB
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
logging:
  level:
    com.hbc: INFO