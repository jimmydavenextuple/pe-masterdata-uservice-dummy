bootJar {
    enabled = true
    mainClass.set("com.hbc.csvdownload.CsvUtilityApplication")
}
dependencies {
    implementation 'com.opencsv:opencsv:5.6'
    implementation(project(":csv-utility:csv-download-common-util"))
    implementation(project(":node-carrier:node-carrier-api-domain"))
    implementation(project(":transit:transit-api-domain"))
    implementation(project(":job-framework:job-framework-common-util"))
    runtimeOnly 'org.postgresql:postgresql'
    implementation(project(":common-util"))
}

test {
    useJUnitPlatform()
}