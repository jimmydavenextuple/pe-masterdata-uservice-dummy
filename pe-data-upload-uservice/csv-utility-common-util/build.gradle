plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    implementation 'com.opencsv:opencsv:5.9'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}