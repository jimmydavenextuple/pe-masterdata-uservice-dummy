plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = false
}

jar {
    enabled = true
}

dependencies {
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-calendar-uservice:calendar-api-domain"))
    implementation 'org.springframework.kafka:spring-kafka'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    api("org.springframework.cloud:spring-cloud-aws-context:2.2.6.RELEASE") {
        exclude group: 'software.amazon.ion', module: 'ion-java'
    }
    implementation 'com.azure:azure-storage-blob:12.26.0'
    implementation "com.azure:azure-identity:1.7.2"
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-xml'
    implementation 'commons-io:commons-io:2.13.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.2'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-common:common-util:jar'
}
