plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}
dependencies {
    implementation 'com.opencsv:opencsv:5.9'
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    runtimeOnly 'org.apache.commons:commons-csv'
    implementation(project(":pe-data-upload-uservice:data-upload-common-util"))

    implementation(project(":pe-node-uservice:node-api-domain"))
    implementation(project(":pe-node-carrier-uservice:node-carrier-api-domain"))
    implementation(project(":pe-carrier-uservice:carrier-api-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation(project(":pe-transit-uservice:transit-api-domain"))
    implementation(project(":pe-weightage-configuration-uservice:weightage-configuration-api-domain"))
    implementation(project(":pe-calendar-uservice:calendar-api-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain"))
    implementation(project(":pe-item-uservice:item-api-domain"))
    implementation(project(":pe-configuration-uservice:configuration-api-domain"))

    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation(project(":pe-data-upload-uservice:jobs-consumer"))
    implementation(project(":pe-data-upload-uservice:jobs-dashboard-api"))
    implementation(project(":pe-data-upload-uservice:job-framework-common-util"))
    implementation(project(":pe-data-upload-uservice:csv-utility-api"))
    implementation(project(":pe-data-upload-uservice:csv-utility-common-util"))
    implementation "org.springframework.kafka:spring-kafka"
    implementation(project(":pe-data-upload-uservice:pe-public-webhook"))
    implementation(project(":pe-data-upload-uservice:user-exit-api"))
    implementation 'commons-io:commons-io:2.13.0'
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-calendar-uservice:calendar-persistence-domain:jar'
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain:jar'
    dependsOn ':pe-data-upload-uservice:csv-utility-api:jar'
    dependsOn ':pe-data-upload-uservice:data-upload-common-util:jar'
    dependsOn ':pe-calendar-uservice:calendar-consumer:jar'
    dependsOn ':pe-calendar-uservice:calendar-services:jar'
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-carrier-uservice:carrier-consumer:jar'
    dependsOn ':pe-carrier-uservice:carrier-services:jar'
    dependsOn ':pe-node-carrier-uservice:node-carrier-api-domain:jar'
    dependsOn ':pe-carrier-uservice:carrier-persistence-postgres:jar'
    dependsOn ':pe-carrier-uservice:carrier-persistence-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    dependsOn ':pe-data-upload-uservice:csv-utility-common-util:jar'
    dependsOn ':pe-data-upload-uservice:job-framework-common-util:jar'
    dependsOn ':pe-calendar-uservice:calendar-persistence-postgres:jar'
    dependsOn ':pe-item-uservice:item-api-domain:jar'
    dependsOn ':pe-weightage-configuration-uservice:weightage-configuration-api-domain:jar'
}



