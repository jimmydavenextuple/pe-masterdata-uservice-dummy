plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = false
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

jar {
    enabled = true
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}


test {
    filter {
        excludeTestsMatching "*.CsvDownloadUtilityServiceTest"
        excludeTestsMatching "*.CsvDownloadUtilityControllerTest"
        excludeTestsMatching "*.TransferSchedulesControllerTest"
        excludeTestsMatching "*.TransferScheduleServiceTest"
    }
}