plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar.enabled=true

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-common:common-util"))
    implementation("com.nextuple.pe:core-near-cache:1.4.0-${build_target}")
    implementation(project(":pe-node-carrier-uservice:node-carrier-api-domain"))
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}