    implementation(project(":common-util"))
    implementation(project(":calendar:calendar-api-domain"))
    implementation 'org.springframework.kafka:spring-kafka:2.9.0'
    api 'org.springframework.cloud:spring-cloud-aws-context:2.2.6.RELEASE'
}