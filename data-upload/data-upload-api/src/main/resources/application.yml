spring:
  config:
    import: optional:aws-secretsmanager:/secret/\${SPRING_PROFILES_ACTIVE}
  application:
    name: "data-upload-service"
    version: 1.0
    title: "Promising Engine Service"
    description: "Promising Engine Service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200
logging:
  level:
    org.springframework: WARN
    root: INFO

dataupload:
  base-path: "/s3-bucket/"
  maxsize-in-kilobytes: 10240
  max-rows: 1000

