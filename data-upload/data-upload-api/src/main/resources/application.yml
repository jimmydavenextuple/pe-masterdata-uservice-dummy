spring:
  servlet:
    multipart:
      max-file-size: 2048KB
      max-request-size: 3072KB
  config:
    import: optional:aws-secretsmanager:/secret/promise-\${SPRING_PROFILES_ACTIVE}
  application:
    name: "data-upload-service"
    version: 1.0
    title: "Promising Engine Service"
    description: "Promising Engine Service"
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200
logging:
  level:
    org.springframework: WARN
    root: WARN
    com.hbc: INFO
pagination:
  pageNo: 1
  pageSize: 15
page-properties:
  pageNo: 1
  pageSize: 15
  sortBy: created_date
  sortOrder: ASC
aws:
  s3:
    signed-url-expiry-minutes: 30
storage:
  type: S3
node-carrier-service-page-properties:
  sortBy: nodeId
  sortOrder: ASC
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: false
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: false
      newrelic:
        enabled: true
        api-key: \${NEW_RELIC_API_KEY}
        account-id: \${NEW_RELIC_ACCOUNT_ID}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
        persistence: true
        cache: true
pe:
  ui:
    allowed-origin-url: \${PE_UI_URL}
auth-token:
  name: amazoncognito-service
  grant-type: client_credentials
  scope: sfcc-resources/edd
scheduled-processor:
  timeRangeInHours: 24
  fixed-rate:
    minutes: 1
download-page-size:
  node: 200