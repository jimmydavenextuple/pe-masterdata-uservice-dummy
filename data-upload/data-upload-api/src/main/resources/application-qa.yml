spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://qa-db.co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
  kafka:
    bootstrap-servers: "b-1.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9096,b-2.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9096,b-3.qakafkacluster.gbed4e.c23.kafka.us-east-1.amazonaws.com:9096"
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"\${KAFKA_USER}\" password=\"\${KAFKA_PWD}\";"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "*"
        acks: 1
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

logging:
  level:
    com.hbc: INFO

dataupload:
  base-path: "/s3-bucket/"
  maxsize-in-kilobytes: 10240
  max-rows: 10000
  bucket-name: "promise-s3-lambda-dev"

jobs-framework:
  kafka-publish:
    topic-name: INTERNAL.QA.JOBS.TASK
  result-publish:
    topic-name: INTERNAL.QA.JOBS.RESULT
  result-consumer:
    topic-name: INTERNAL.QA.JOBS.RESULT
    group-id: jobs-result-consumer-async-qa
  record-consumer:
    topic-name: INTERNAL.QA.JOBS.TASK
    group-id: jobs-task-consumer-async-qa
auth-token:
  url: https://promise-engine-dev-pool.auth.us-east-1.amazoncognito.com
  username: \${COGNITO_CLIENT_ID}
  password: \${COGNITO_CLIENT_SECRET}