spring:
  application:
    dependencies:
      node: "http://localhost:8082/"
      calendar: "http://localhost:8080/"
      node-carrier: "http://localhost:8084/"
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "*"
        acks: 1
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

logging:
  level:
    com.hbc: INFO

jobs-framework:
  kafka-publish:
    topic-name: jobs-task-local
  result-publish:
    topic-name: jobs-result-local
  result-consumer:
    topic-name: jobs-result-local
    group-id: jobs-result-consumer-async-local
  record-consumer:
    topic-name: jobs-task-local
    group-id: jobs-task-consumer-async-local
dataupload:
  base-path: "/s3-bucket/"
  maxsize-in-kilobytes: 10240
  max-rows: 1000
pe:
  ui:
    allowed-origin-url: "*"
auth-token:
  url: https://promise-engine-dev-pool.auth.us-east-1.amazoncognito.com
  username: user
  password: password