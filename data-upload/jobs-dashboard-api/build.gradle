bootJar {
    enabled = false
}

jar {
    enabled = true
}

dependencies {
    runtimeOnly 'org.postgresql:postgresql'
    implementation(project(":common-util"))
    implementation(project(":data-upload:job-framework-common-util"))
    implementation "org.springframework.kafka:spring-kafka:2.8.7"
    implementation group: 'com.opencsv', name: 'opencsv', version: '5.2'
    implementation(project(":data-upload:csv-utility-api"))
    implementation 'org.apache.commons:commons-csv:1.5'
    implementation(project(":data-upload:csv-utility-common-util"))
    implementation(project(":data-upload:jobs-consumer"))
    implementation(project(":data-upload:data-upload-common-util"))
    implementation(project(":postal-code-timezone:postal-code-timezone-api-domain"))
}