plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":pe-transit-uservice:transit-api-domain"))
    implementation(project(":pe-transit-uservice:transit-persistence-domain"))
    implementation(project(":pe-transit-uservice:transit-persistence-postgres"))
    implementation(project(":pe-transit-uservice:transfer-schedule-cache"))
    runtimeOnly 'org.postgresql:postgresql:42.7.2'
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.3"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-domain"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))

    implementation(project(":pe-carrier-uservice:carrier-api-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation(project(":pe-data-upload-uservice:job-framework-common-util"))
    implementation(project(":pe-data-upload-uservice:data-upload-common-util"))
    implementation(project(":pe-node-uservice:node-api-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-services"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain"))

    implementation "org.springframework.kafka:spring-kafka"
    implementation 'org.apache.commons:commons-csv:1.5'
    implementation "org.springframework.boot:spring-boot-starter-validation:3.2.4"
    implementation group: 'com.opencsv', name: 'opencsv', version: '5.2'
    implementation "jakarta.validation:jakarta.validation-api:3.0.2"
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
    implementation 'io.swagger.core.v3:swagger-models:2.2.0'
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-transit-uservice:transit-persistence-postgres:jar'
    dependsOn ':pe-transit-uservice:transit-persistence-domain:jar'
    dependsOn ':pe-carrier-uservice:carrier-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-data-upload-uservice:job-framework-common-util:jar'
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-data-upload-uservice:data-upload-common-util:jar'
    dependsOn ':pe-node-carrier-uservice:node-carrier-api-domain:jar'
    dependsOn ':pe-configuration-uservice:configuration-api-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}
