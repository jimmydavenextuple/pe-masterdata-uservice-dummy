plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":pe-transit-uservice:transit-api-domain"))
    implementation(project(":pe-transit-uservice:transit-persistence-domain"))
    implementation(project(":pe-transit-uservice:transit-persistence-postgres"))
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-domain:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-producer:1.4.0-${build_target}")

//    implementation("com.nextuple.pe:carrier-api-domain:1.4.0-${build_target}")
    implementation(project(":carrier-api-domain"))
//    implementation("com.nextuple.pe:postal-code-timezone-api-domain:1.4.0-${build_target}")
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation("com.nextuple.pe:job-framework-common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:data-upload-common-util:1.4.0-${build_target}")
//    implementation("com.nextuple.pe:node-api-domain:1.4.0-${build_target}")
    implementation(project(":node-api-domain"))

    implementation "org.springframework.kafka:spring-kafka"
    implementation 'org.apache.commons:commons-csv:1.5'
    implementation "org.springframework.boot:spring-boot-starter-validation:3.2.4"
    implementation group: 'com.opencsv', name: 'opencsv', version: '5.2'
    implementation "jakarta.validation:jakarta.validation-api:3.0.2"
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-transit-uservice:transit-persistence-postgres:jar'
    dependsOn ':pe-transit-uservice:transit-persistence-domain:jar'
    dependsOn ':carrier-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    dependsOn ':node-api-domain:jar'
}
