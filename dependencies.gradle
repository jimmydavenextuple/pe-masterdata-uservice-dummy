ext.libs = [
        'springConfigProcess': 'org.springframework.boot:spring-boot-configuration-processor',
        'lombok':'org.projectlombok:lombok',
        'mapstruct': 'org.mapstruct:mapstruct-processor:${mapstructVersion}',
        'logstash': 'net.logstash.logback:logstash-logback-encoder:6.4',
        'springKafka': 'org.springframework.kafka:spring-kafka:2.5.6.RELEASE',

        //Nextupe
        'nxCommonUtil': 'com.nextuple.controltower:common-util:1.10.0-${build_target}',
        'nxCoreCommonLib': 'com.nextuple.core:core-common-lib:1.10.0-${build_target}'
]

ext.libTests = [
        'springTest': 'org.springframework.boot:spring-boot-starter-test',
        'mongo': 'de.flapdoodle.embed:de.flapdoodle.embed.mongo',
        'hamcrest': 'org.hamcrest:hamcrest-junit:${hamcrestJunitVersion}',
        'jayway': 'com.jayway.jsonpath:json-path-assert:${jsonpathVersion}',
        'javakafer' : 'com.github.javafaker:javafaker:1.0.2',
        'jupiter' : 'org.junit.jupiter:junit-jupiter:5.6.2',
        'jupiterApi' : 'org.junit.jupiter:junit-jupiter-api:5.3.1',
