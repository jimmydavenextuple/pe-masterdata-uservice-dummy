bootJar {
    enabled = true
    mainClass.set("com.nextuple.promise.sourcing.rule.PromiseSourcingRuleApplication")
}


configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":promise-sourcing-rule:promise-sourcing-rule-api-domain"))
    implementation(project(":common-util"))
    implementation 'com.vladmihalcea:hibernate-types-52:2.16.2'
    implementation(project(":nfs-near-cache:core-near-cache-producer"))
    runtimeOnly 'org.postgresql:postgresql'
}
sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11