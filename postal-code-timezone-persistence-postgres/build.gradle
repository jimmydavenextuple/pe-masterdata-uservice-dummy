plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled=true
}

bootJar {
    enabled = false
}

dependencies {

    implementation(project(":postal-code-timezone-api-domain"))
    implementation("com.nextuple.pe:common-util:1.3.0-${build_target}")
    implementation("com.nextuple.pe:common-domain:1.3.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.3.0-${build_target}")
    implementation("com.nextuple.pe:core-near-cache-producer:1.3.0-${build_target}")
    implementation(project(":postal-code-timezone-persistence-domain"))

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn(
            ':postal-code-timezone-persistence-domain:jar',
            ':postal-code-timezone-api-domain:jar'
    )
}