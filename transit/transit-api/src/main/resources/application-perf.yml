spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-perf.cluster-co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
    hikari:
      connectionTimeout: 5000
  replica:
    datasource:
      platform: postgres
      url: jdbc:postgresql://promise-engine-postgres-perf.cluster-ro-co9l0bkmgaei.us-east-1.rds.amazonaws.com,promise-engine-postgres-perf.cluster-co9l0bkmgaei.us-east-1.rds.amazonaws.com/pe?readOnly=true
      username: \${POSTGRES_USER}
      password: \${POSTGRES_PWD}
      required: true
      hikari:
        readOnly: true
        maximumPoolSize: 20
        connectionTimeout: 5000
  kafka:
    bootstrap-servers: "b-1.promiseenginekafkaper.wyucgs.c23.kafka.us-east-1.amazonaws.com:9096,b-3.promiseenginekafkaper.wyucgs.c23.kafka.us-east-1.amazonaws.com:9096,b-2.promiseenginekafkaper.wyucgs.c23.kafka.us-east-1.amazonaws.com:9096"
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"\${KAFKA_USER}\" password=\"\${KAFKA_PWD}\";"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.PERF.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: all
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"
logging:
  level:
    root: WARN
    com.hbc: INFO
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_Pk3rFdZm1