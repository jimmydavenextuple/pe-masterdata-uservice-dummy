spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://promise-engine-postgres-prod.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig
    username: \${POSTGRES_USER}
    password: \${POSTGRES_PWD}
  replica:
    datasource:
      platform: postgres
      url: jdbc:postgresql://promise-engine-postgres-prod.cluster-ro-cboxgnkbeo0q.us-east-1.rds.amazonaws.com,promise-engine-postgres-prod.cluster-cboxgnkbeo0q.us-east-1.rds.amazonaws.com/peconfig?readOnly=true
      username: \${POSTGRES_USER}
      password: \${POSTGRES_PWD}
      required: true
      hikari:
        readOnly: true
        maximumPoolSize: 20
  kafka:
    bootstrap-servers: "b-1.promiseenginekafkapro.o79lf2.c23.kafka.us-east-1.amazonaws.com:9096,b-2.promiseenginekafkapro.o79lf2.c23.kafka.us-east-1.amazonaws.com:9096,b-3.promiseenginekafkapro.o79lf2.c23.kafka.us-east-1.amazonaws.com:9096"
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"\${KAFKA_USER}\" password=\"\${KAFKA_PWD}\";"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topics:
        master_data_update_event: INTERNAL.PROD.MASTER_DATA_UPDATE_EVENTS
      properties:
        acks: all
        retries: 5
        retry.backoff.ms: 1000
        spring.json.trusted.packages: "*"

logging:
  level:
    root: WARN
    com.hbc: INFO
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_phMvZ9Tci