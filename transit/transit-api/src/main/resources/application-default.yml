spring:
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

logging:
  level:
    com.nextuple: INFO

entity-listener:
  kafka:
    enabled: false
jobs-framework:
  job-completion-consumer:
    topic-name: job-completion-local
    group-id: jobs-completion-consumer-async-local
pe:
  ui:
    allowed-origin-url: "*"
auth:
  issuer: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_FAqWuc7OP
dataupload:
  bucket-name: "promise-s3-lambda-dev"