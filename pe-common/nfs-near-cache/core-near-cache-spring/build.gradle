plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}

bootJar {
    enabled = false
}

dependencies {
    implementation project(":pe-common:nfs-near-cache:core-near-cache")
    implementation group: 'org.springframework.data', name: 'spring-data-redis'

    testImplementation group: "org.junit.jupiter", name: "junit-jupiter", version: "5.10.2"
    testImplementation group: "org.mockito", name: "mockito-junit-jupiter", version: "4.11.0"

}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
tasks.named('test') {
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}
