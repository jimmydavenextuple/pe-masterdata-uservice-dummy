plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    api "joda-time:joda-time:${jodaTimeVersion}"
    implementation("com.jayway.jsonpath:json-path:2.9.0")
    implementation 'com.google.code.gson:gson:2.9.0'
    api "com.openpojo:openpojo:0.8.13"
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
    implementation 'io.swagger.core.v3:swagger-models:2.2.0'

    testImplementation "org.junit.jupiter:junit-jupiter:5.11.3"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    implementation 'io.hypersistence:hypersistence-utils-hibernate-63:3.9.1'

}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}