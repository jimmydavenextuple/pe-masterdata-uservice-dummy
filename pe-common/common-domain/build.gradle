plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('generateMetadataFileForMavenJavaPublication') {
    dependsOn tasks.jar
    inputs.files tasks.jar.outputs
}