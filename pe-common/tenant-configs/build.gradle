plugins {
    id 'java'
}


jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-common:common-domain"))
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-consumer"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-spring"))
    implementation("com.nextuple.pe:configuration-near-cache:1.4.1-${build_target}")
    implementation("com.nextuple.pe:configuration-near-cache-spring:1.4.1-${build_target}")

    implementation 'com.google.code.gson:gson:2.9.0'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}