plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    implementation "com.nextuple.platform:common:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:sql:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:kafka:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:tasks:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:tasks-sql:1.1.5Java21-SNAPSHOT"
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    implementation "com.nextuple.platform:next-cache:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:purge:1.1.5Java21-SNAPSHOT"
    implementation "com.nextuple.platform:purge-sql:1.1.5Java21-SNAPSHOT"
    implementation(project(":pe-data-upload-uservice:job-framework-common-util"))
    implementation(project(":pe-common:common-util"))
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testImplementation "org.junit.jupiter:junit-jupiter-params:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}


tasks.named('bootJar') {
    dependsOn ':pe-common:common-domain:jar'
}
tasks.test {
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-data-upload-uservice:job-framework-common-util:jar'
}