plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {
    implementation "com.nextuple.platform:common:${platformTaskVersion}"
    implementation "com.nextuple.platform:sql:${platformTaskVersion}"
    implementation "com.nextuple.platform:kafka:${platformTaskVersion}"
    implementation "com.nextuple.platform:tasks:${platformTaskVersion}"
    implementation "com.nextuple.platform:tasks-sql:${platformTaskVersion}"
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.3"
    implementation "com.nextuple.platform:next-cache:${platformTaskVersion}"
    implementation "com.nextuple.platform:purge:${platformPurgeVersion}"
    implementation "com.nextuple.platform:purge-sql:${platformPurgeVersion}"
    implementation(project(":pe-data-upload-uservice:job-framework-common-util"))
    implementation(project(":pe-common:common-util"))
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.11.3'
    testImplementation "org.junit.jupiter:junit-jupiter-params:5.11.3"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.11.3'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}


tasks.named('bootJar') {
    dependsOn ':pe-common:common-domain:jar'
}
tasks.test {
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-calendar-uservice:calendar-api-domain:jar'
    dependsOn ':pe-data-upload-uservice:job-framework-common-util:jar'
}