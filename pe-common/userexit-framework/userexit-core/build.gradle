plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}

dependencies {

    implementation("com.jayway.jsonpath:json-path:2.9.0")
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
    implementation 'com.google.code.gson:gson:2.9.0'

    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-spring"))
    implementation(project(":pe-common:userexit-framework:userexit-domain"))
    implementation(project(":pe-common:userexit-framework:userexit-near-cache"))
    implementation(project(":pe-common:userexit-framework:userexit-near-cache-spring"))
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
javadoc {
    title = 'User Exit Services'
    include(
            'com/nextuple/common/userexit/ExitPointInvoker.java',
            'com/nextuple/common/userexit/ExitPointJvmInvokerImpl.java',
            'com/nextuple/common/userexit/IClassBasedExit.java')
}

tasks.named('test') {
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-spring:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
    dependsOn ':pe-common:userexit-framework:userexit-domain:jar'
    dependsOn ':pe-common:userexit-framework:userexit-near-cache:jar'
    dependsOn ':pe-common:userexit-framework:userexit-near-cache-spring:jar'
}
