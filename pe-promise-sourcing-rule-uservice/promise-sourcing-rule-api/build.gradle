plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

bootJar {
    enabled = true
    mainClass.set("com.nextuple.promise.sourcing.rule.PromiseSourcingRuleApplication")
}


configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-services"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain"))
    implementation(project(":pe-node-uservice:node-api-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))

    implementation(project(":pe-promise-sourcing-rule-uservice:sourcing-cost-config-services"))
    implementation(project(":pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain"))

    implementation(project(":pe-common:common-util"))
    implementation 'io.hypersistence:hypersistence-utils-hibernate-63:3.9.1'
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-producer"))
    implementation(project(":pe-common:common-postgres"))
    runtimeOnly 'org.postgresql:postgresql:42.7.2'
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.3"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
}
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('bootJar') {
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    dependsOn ':pe-configuration-uservice:configuration-api-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

tasks.named('test') {
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    dependsOn ':pe-configuration-uservice:configuration-api-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

