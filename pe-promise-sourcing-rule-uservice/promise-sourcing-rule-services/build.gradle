plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}


dependencies {
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-postgres"))
    implementation("com.nextuple.pe:common-util:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-domain:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation("com.nextuple.pe:core-near-cache-producer:1.4.0-${build_target}")
    implementation("com.nextuple.pe:common-postgres:1.4.0-${build_target}")
    runtimeOnly 'org.postgresql:postgresql'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
//    implementation(project(":pe-node-uservice:node-api-domain"))
//    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation(project(":pe-node-uservice:node-api-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))

}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-postgres:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-persistence-domain:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:promise-sourcing-rule-api-domain:jar'
    dependsOn ':pe-node-uservice:node-api-domain:jar'
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
}
