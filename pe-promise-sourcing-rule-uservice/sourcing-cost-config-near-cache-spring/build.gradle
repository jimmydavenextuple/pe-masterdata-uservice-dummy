plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar.enabled=true

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain"))
    implementation(project(":pe-promise-sourcing-rule-uservice:sourcing-cost-config-near-cache"))

    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-spring"))

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"

    constraints {
        implementation('io.github.openfeign:feign-core:11.8') {
            because 'versions below are vulnerable to CVE-2019-16942'
        }
    }
}
sourceCompatibility = JavaVersion.VERSION_21
targetCompatibility = JavaVersion.VERSION_21
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-promise-sourcing-rule-uservice:sourcing-cost-config-near-cache:jar'
    dependsOn ':pe-promise-sourcing-rule-uservice:sourcing-cost-config-api-domain:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-spring:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}
