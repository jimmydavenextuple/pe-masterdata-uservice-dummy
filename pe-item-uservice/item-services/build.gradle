plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-item-uservice:item-api-domain"))
    implementation(project(":pe-item-uservice:item-persistence-domain"))
    implementation(project(":pe-item-uservice:item-persistence-postgres"))
    runtimeOnly 'org.postgresql:postgresql:42.7.2'
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation "jakarta.validation:jakarta.validation-api:3.0.2"
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-joda"
    implementation "org.springframework.kafka:spring-kafka"
    implementation(project(":pe-common:common-domain"))
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-postgres"))
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
    implementation 'org.jetbrains:annotations:16.0.2'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.14'
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-item-uservice:item-persistence-domain:jar',':pe-item-uservice:item-api-domain:jar',':pe-item-uservice:item-persistence-postgres:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-producer:jar'
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
}

tasks.test {
    useJUnitPlatform()
}