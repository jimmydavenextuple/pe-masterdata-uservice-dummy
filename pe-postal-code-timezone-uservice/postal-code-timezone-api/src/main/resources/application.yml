spring:
  application:
    name: "pe-postal-code-timezone-uservice"
    version: ${version}
    title: "Postal Code Timezone Service"
    description: "Promising engine postal code timezone service"
    properties:
      group: promising-and-sourcing
      customerFacing: false
  main:
    allow-bean-definition-overriding: true
server:
  port: 8080
  tomcat:
    max-connections: 500
    threads:
      min-spare: 50
      max: 200

logging:
  level:
    org.springframework: WARN
    root: WARN
    com.nextuple: INFO
availability:
  keys: LINE,ORDER
entity-listener:
  kafka:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
    loggers:
      enabled: true
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
        persistence: true
        cache: true
#pe:
#  ui:
#    allowed-origin-url: \${PE_UI_URL}
pagination:
  pageNo: 1
  pageSize: 15
feign:
  okhttp:
    enabled: true
auth:
  filterEnabled: false
