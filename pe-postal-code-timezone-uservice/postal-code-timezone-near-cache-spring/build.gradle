plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar.enabled=true

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache"))
    implementation(project(":pe-common:nfs-near-cache:core-near-cache-spring"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-near-cache"))
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.3"
    testImplementation "org.mockito:mockito-junit-jupiter:4.11.0"

    constraints {
        implementation('io.github.openfeign:feign-core:11.8') {
            because 'versions below are vulnerable to CVE-2019-16942'
        }
    }
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache-spring:jar'
    dependsOn ':pe-common:nfs-near-cache:core-near-cache:jar'
    dependsOn(
            ':pe-postal-code-timezone-uservice:postal-code-timezone-near-cache:jar',
            ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    )
}