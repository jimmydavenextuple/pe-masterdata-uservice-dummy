plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar{
    enabled = true
}

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-persistence-domain"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-persistence-postgres"))

    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-common:common-postgres"))
    implementation(project(":pe-common:common-domain"))
    implementation 'io.hypersistence:hypersistence-utils-hibernate-60:3.6.1'
    implementation("com.nextuple.pe:core-near-cache-producer:1.3.0-${build_target}")
    runtimeOnly 'org.postgresql:postgresql'

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testImplementation "org.mockito:mockito-junit-jupiter:3.12.4"
}

test {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn(
            ':pe-postal-code-timezone-uservice:postal-code-timezone-persistence-postgres:jar',
            ':pe-postal-code-timezone-uservice:postal-code-timezone-persistence-domain:jar',
            ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
    )
    dependsOn ':pe-common:common-util:jar'
    dependsOn ':pe-common:common-postgres:jar'
    dependsOn ':pe-common:common-domain:jar'
}