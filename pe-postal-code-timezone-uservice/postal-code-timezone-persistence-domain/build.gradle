plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled=true
}

bootJar {
    enabled = false
}

dependencies {
    implementation(project(":pe-common:common-domain"))
    implementation(project(":pe-common:common-util"))
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
}

tasks.named('test') {
    dependsOn ':pe-transit-uservice:transit-api-domain:jar'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}