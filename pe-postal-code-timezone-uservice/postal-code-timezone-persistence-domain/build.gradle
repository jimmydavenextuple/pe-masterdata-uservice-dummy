plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled=true
}

bootJar {
    enabled = false
}

dependencies {
    implementation("com.nextuple.pe:common-domain:1.3.0-${build_target}")
    implementation("com.nextuple.pe:common-util:1.3.0-${build_target}")
    implementation(project(":pe-postal-code-timezone-uservice:postal-code-timezone-api-domain"))
}

tasks.named('test') {
    dependsOn ':transit-api-domain:jar'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}