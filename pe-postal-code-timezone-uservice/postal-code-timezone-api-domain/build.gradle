plugins {
    id 'io.spring.dependency-management' version '1.1.4'
}

jar {
    enabled = true
}
bootJar {
    enabled = false
}
dependencies {
    runtimeOnly 'org.postgresql:postgresql'
    implementation("com.nextuple.pe:common-util:1.3.0-${build_target}")
}
tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.named('test') {
    dependsOn ':pe-postal-code-timezone-uservice:postal-code-timezone-api-domain:jar'
}
