name: PROMISE-SOURCING-RULE BUILD-DEPLOY

on:
  push:
    branches: [ devr3 ]
    paths:
      - "promise-sourcing-rule/**"
      - "deploy-scripts/**"
      - "manifests/**"
      - ".github/**"
jobs:

  Build-Deploy:
    name: R3
    uses: ./.github/workflows/build&deploy.yml
    with:
      module: promise-sourcing-rule
    secrets: inherit




