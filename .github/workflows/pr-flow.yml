name: reusable-workflow

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string

jobs:
  PR-CHECK:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: 11
        cache: 'gradle'
    - name: PR-BUILD
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        bash ./gradlew -Pbuild_target=SNAPSHOT clean build jacocoTestReport spotlessApply spotbugsMain -p ${{ inputs.module }}
        bash ./gradlew -Pbuild_target=SNAPSHOT test jacocoTestReport
        bash ./gradlew -Pbuild_target=SNAPSHOT dependencyCheckAggregate --info
        bash ./gradlew sonarqube -Dsonar.login=$SONAR_TOKEN -Dsonar.pullrequest.branch=${{ github.head_ref }} -Dsonar.pullrequest.base=master -Dsonar.pullrequest.key=${{ github.event.number }} showSonarQubeLink --info
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v1
      if: always()
      with:
        files: "**/**/test-results/**/*.xml"