bootJar {
    enabled = true
    mainClass.set("com.hbc.nodecarrier.data.upload.utility.NodeCarrierDataUploadUtilityApplication")
}

configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.apache.commons:commons-csv'
    implementation(project(":data-upload-utility:data-upload-common-util"))
    implementation(project(":node-carrier:node-carrier-api-domain"))
    implementation(project(":common-util"))
}
sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11