bootJar {
    enabled = true
    mainClass.set("com.hbc.common.configuration.CommonConfigurationApplication")
}

configurations {
    [apiElements, runtimeElements].each {
        it.outgoing.artifacts.removeIf { it.buildDependencies.getDependencies(null).contains(jar) }
        it.outgoing.artifact(bootJar)
    }
}

dependencies {
    implementation(project(":common-configuration:common-configuration-api-domain"))
    implementation(project(":common-util"))
    implementation(project(":nfs-near-cache:core-near-cache-producer"))
    runtimeOnly 'org.postgresql:postgresql'
}
sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11